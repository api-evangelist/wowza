                $ref: '#/components/schemas/ApplicationsConfig'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Internal server error
    post:
      tags:
        - Applications
      operationId: postApplicationsConfig
