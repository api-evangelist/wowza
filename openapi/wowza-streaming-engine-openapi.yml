  /v2/servers/{serverName}/logfiles/{logName}:
    get:
      tags:
        - Servers Configuration
      operationId: getServerLogFileConfig
      summary: Get log file
      description: >-
        Retrieves the contents of a server log with the specified log name. This
        API is available in builds 15089 or later.
      parameters:
        - name: serverName
          in: path
          required: true
          description: Reserved for future use
          schema:
            type: string
            default: _defaultServer_
        - name: lineCount
          in: query
          required: false
          description: >-
            The number of log lines requested, where a postive number indicates
            log lines after startOffset and a negative number indicate log lines
            before startOffset
          schema:
            type: string
            default: '100'
        - name: startOffset
          in: query
          required: false
          description: The byte offset in the file at which to begin getting log lines
          schema:
            type: string
        - name: filter
          in: query
          required: false
          description: >-
            A string containing a list of predefined search filters separated by
            | where valid strings are
            noDebug,noInfo,noWarn,noError,noHeader,noColumnHeadings
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: A string containing a literal string on which to filter or a regex
          schema:
            type: string
        - name: regexSearch
          in: query
          required: false
          description: 'Indicates if the ''search'' parameter is a regex or a literal string '
          schema:
            type: string
            enum:
              - 'false'
              - 'true'
            default: 'false'
        - name: head
          in: query
          required: false
          description: >-
            Returns the first x lines from the requested log file, the overrides
            the startoffset and linecount values
          schema:
            type: string
        - name: tail
          in: query
          required: false
          description: >-
            Returns the last x lines from the requested log file, the overrides
            the startoffset and linecount values
          schema:
            type: string
        - name: logName
          in: path
          required: true
          description: The name of the log
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerLogFileConfig'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
        '500':
          description: Internal server error
