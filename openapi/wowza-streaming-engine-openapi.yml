    put:
      tags:
        - Applications
      operationId: putDvrRESTConverterStoresAction
      summary: DVR stores actions
      description: >-
        DVR REST converter store actions. This API is available in builds 15942
        or later.
      parameters:
        - name: serverName
          in: path
          required: true
          description: Reserved for future use
          schema:
            type: string
            default: _defaultServer_
        - name: action
          in: path
          required: true
          description: The action which should be performed by the server
          schema:
            type: string
        - name: dvrConverterDefaultFileDestination
          in: query
          required: false
          description: >-
            The file location to use when converting a nDVR store, the default
            is configured as the StorageDir in the application in use
          schema:
            type: string
        - name: dvrConverterDebugConversions
          in: query
          required: false
          description: >-
            Indicates if the conversion should have debugging enabled, can be
            true or false, default is false
          schema:
            type: string
        - name: dvrConverterContinueOnSourceErrors
          in: query
          required: false
          description: >-
            Indicates if the conversion should continue even if errors are
            detected, can be true or false, default is true
          schema:
            type: string
        - name: dvrConverterAudioVideoSyncEnable
          in: query
          required: false
          description: >-
            Indicates if the audio/video offset should be detected and
            conversion only started after the sync in no longer detected or over
            default allowable time. Can be true or false, default is false
          schema:
            type: string
        - name: dvrConverterAudioVideoMaxOffset
          in: query
          required: false
          description: Indicates the maximum audio/video timecodes can be out of sync
          schema:
            type: string
            default: '200'
        - name: dvrConverterAudioVideoMaxBuffer
          in: query
          required: false
          description: >-
            Indicates the maximum time a correct audio/video sync will be
            searched for before giving up
          schema:
            type: string
            default: '8000'
        - name: dvrConverterStartTime
          in: query
          required: false
          description: >-
            A start time in UTC from where the conversion should start in the
            store, default is the first entry in the store
          schema:
            type: string
        - name: dvrConverterEndTime
          in: query
          required: false
          description: >-
            A end time in UTC  where the conversion should end in the store,
            default is to the end of the store
          schema:
            type: string
        - name: dvrConverterDuration
          in: query
          required: false
          description: >-
            A duration for the conversion either added to the start or
            subtracted from the end time, if you use duration you can not use
            start and end
          schema:
            type: string
        - name: dvrConverterOutputFilename
          in: query
          required: false
          description: >-
            Indicates the output filename if not using the default, which is the
            name of the store being converted
          schema:
            type: string
        - name: dvrConverterStoreList
          in: query
          required: false
          description: The comma-separated list of stores to convert
          schema:
            type: string
        - name: vhostName
          in: path
          required: true
          description: The name of the current VHost the action will be performed on
          schema:
            type: string
            default: _defaultVHost_
        - name: appName
          in: path
          required: true
          description: The application name needed for this REST call
          schema:
            type: string
        - name: instanceName
          in: path
          required: true
          description: The application instance name needed for this REST call
          schema:
            type: string
            default: _definst_
