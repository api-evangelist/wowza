            scheduled.
          example: P0NrTP7m
        transcoder_name:
          type: string
          description: The name of the transcoder being scheduled.
          example: My Camera
        updated_at:
          type: string
          description: The date and time that the schedule was updated.
          example: '2020-01-30T16:44:37.995Z'
          format: date-time
