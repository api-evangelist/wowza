    analytics_engagement_vod_stream:
      type: object
      description: ''
      properties:
        vod_stream:
          type: object
          title: vod_stream
          description: ''
          properties:
            id:
              type: string
              description: The unique alphanumeric string that identifies the VOD stream.
              format: int32
            play_rate:
              type: integer
              description: >-
                The ratio between displays and plays. For example, 100 displays
                and 20 plays will result in 0.20 which means that 20% of the
                displays resulted in a play.
              example: ''
              format: int32
            completion_rate:
              type: integer
              description: >-
                The ratio of viewers that watched the last segment of the asset.
                It is represented in a decimal value.
              example: ''
            duration_ms:
              type: integer
              description: The length of the stream in milliseconds.
              example: ''
            avg_seconds_watched:
              type: integer
              description: The average number of seconds the viewers viewed the stream.
              example: ''
            avg_percentage_watched:
              type: integer
              description: The average time watched represented as a percentage.
              example: ''
            total_seconds_watched:
              type: integer
              description: The total number of seconds the stream was viewed.
              example: ''
            trend:
              type: object
              title: Array of viewer trends
              description: >-
                An array of viewer trend data for an asset in the given time
                period.


                 <blockquote>Note: Data from the most recent hour data might not be included in the result of a time range that extends beyond the most recent 3 days. </blockquote>


                <strong>Default</strong>: Last hour
              properties:
                percent:
                  type: integer
                  description: >-
                    A specific segment of the VOD asset. A VOD asset has 100
                    segments and each segment represents a completion percentage
                    of the asset. For example, 1 is the data for 0 to 1% of the
                    asset, 2 is the data for 1 to 2% and so on.


                    Trend data is aggregated for each segment.


                    Use _**duration_ms** / 1000 x **percent**_ to calculate a
                    timestamp, in seconds, for the trend data.
                  format: int32
                viewers:
                  type: integer
                  description: >-
                    The total number of unique viewers who watched this specific
                    segment of the VOD asset. A unique viewer is a single IP
                    address; multiple users that share the same IP address are
                    counted once.
                  example: ''
                  format: int32
            limits:
              type: object
              description: The time frame represented in the response.
              properties:
                from:
                  type: string
                  description: The start of the range of time represented in the response.
                  example: ''
                  format: date-time
                to:
                  type: string
                  description: The end of the range of time represented in the response.
                  example: ''
                  format: date-time
      example:
        vod_stream:
          id: tvctq36g
          play_rate: 0.2
          completion_rate: 0.42
          duration_ms: 9761000
          avg_seconds_watched: 302
          avg_percentage_watched: 67
          total_seconds_watched: 77699
