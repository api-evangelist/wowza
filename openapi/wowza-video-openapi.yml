  /analytics/qoe/rebuffer_time/media/{id}:
    get:
      summary: Fetch rebuffer time metrics for specific live streams and videos
      description: >-
        (Available from version 2.0) This operation returns the rebuffer time
        metrics for specific live stream(s) and/or video(s).
      operationId: analyticsQoerebufferTimeMedia
      tags:
        - quality_of_experience
      x-codeSamples:
        - lang: Shell
          source: |
            // Using cURL
            curl -H "Authorization: Bearer ${WV_JWT}" \
              
              -H "Content-Type: application/json" \
              -X "GET" \
              "${WV_HOST}/api/2.0/analytics/qoe/rebuffer_time/media/7ced08dd-a744-4944-bb87-019979cb3597,6fa964ce-9515-4001-ae72-f17ae52dbf6c?from=2024-09-08T14:35:00.486Z&to=2024-10-08T14:35:00.486Z&devices=Desktop&include=trend';
        - lang: JavaScript
          source: >-
            // Using Node.js

            const https = require('https');

            const crypto = require('crypto');

            var hostname = 'api.video.wowza.com'

            var path =
            '/api/2.0/analytics/qoe/rebuffer_time/media/7ced08dd-a744-4944-bb87-019979cb3597,6fa964ce-9515-4001-ae72-f17ae52dbf6c?from=2024-09-08T14:35:00.486Z&to=2024-10-08T14:35:00.486Z&devices=Desktop&include=trend';

            //For security, never reveal API token in client-side code

            var wvJWT = 'Bearer [your JWT]';


            const options = {
              hostname: hostname,
              path: path,
              headers: {
                'Authorization': wvJWT,
                'Content-Type': 'application/json'
              }
            };

            https.get(options, function(res) {
              var body = '';
              res.on('data', function(data){
                body += data;
              });
              res.on('end', function() {
                console.log(JSON.parse(body));
              });
            }).on('error', function(e) {
              console.log(e.message);
            });
      parameters:
