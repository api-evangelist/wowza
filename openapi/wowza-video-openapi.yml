                returns sample intervals by the hour. You can return sample
                intervals by the minute by specifying a specific hour range.


                2. Requests made for data _beyond_ the most recent 3 days can
                only return sample intervals by the hour or day. The minute data
                is not retained beyond the 3rd day. 


