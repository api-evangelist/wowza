              viewers: 10
            - percent: 6
              viewers: 7
            - percent: 7
              viewers: 7
            - percent: 8
              viewers: 25
            - percent: 9
              viewers: 25
            - percent: 10
              viewers: 25
            - percent: 11
              viewers: 7
            - spercent: 12
              viewers: 7
            - percent: 13
              viewers: 7
