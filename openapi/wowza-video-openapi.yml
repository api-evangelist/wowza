            about the VOD stream associated with the asset, such as the size of
            only the VOD stream.
          example: l9qsbwvf
        recording_id:
          type: string
          description: >-
            An ID for the recording. You can use this to fetch additional
            information about the recording associated with the asset.
          example: l8qsbwvu
        state:
          type: string
          description: The state of the asset.
          example: completed
          enum:
            - uploading
            - processing
            - completed
            - failed
        reason:
          type: string
          description: >-
            The reason that an asset has the state **failed**. Only returned
            when state is **failed** after processing is attempted.
          example: ''
        created_at:
          type: string
          description: "The date and time that the asset was created in Coordinated Universal Time (UTC) format. Dates are formatted as follows:\_YYYY-DD-MMTHH:MM:SSZ\_using 24-hour clock (\"military\") time and including the T and Z. The T marks the end of the date portion and the Z represents zero UTC time offset."
          example: '2021-06-30T18:02:20.000Z'
          format: date-time
        updated_at:
          type: string
          description: "The date and time that the asset was updated in Coordinated Universal Time (UTC) format. Dates are formatted as follows:\_YYYY-DD-MMTHH:MM:SSZ\_using 24-hour clock (\"military\") time and including the T and Z. The T marks the end of the date portion and the Z represents zero UTC time offset.\_"
          example: '2021-06-30T18:02:20.000Z'
          format: date-time
        download_url:
          type: string
          description: The URL that can be used to download the asset as a .MP4 file.
          example: >-
            https://objectstorage.us-ashburn-1.oraclecloud.com/n/idcrz33q3xdo/b/recordings-qa-S7I69eYn/o/abcd1234/recording_0pfxrlw2/MyAsset.mp4
        file_size:
          type: integer
          description: >-
            The file size of the asset in bytes. For example, 2372820 bytes
            equals 2.4 megabytes.
          example: 2372820
        duration:
          type: integer
          description: >-
            The length of an asset in seconds. For example, 9241 would represent
            9,241 seconds or roughly 2.5 hours.
          example: 9241
        thumbnail_url:
          type: string
          description: The URL to receive the preview thumbnail.
          example: >-
            https://objectstorage.us-ashburn-1.oraclecloud.com/n/idcrz33q3xdo/b/recordings-qa-S7I69eYn/o/abcd1234/recording_0pfxrlw2/0pfxrlw2_thumbnail.jpg
        unique_viewers:
          type: integer
          description: >-
            The unique_viewers parameter is deprecated. To get unique viewers
            for an asset, use the GET /analytics/viewers/vod_stream/{id}
            endpoint.
          example: 5986
        total_viewing_time:
          type: integer
          description: The total_viewing_time parameter is deprecated.
          example: 4492549
        average_view_time:
          type: integer
          description: The average_view_time parameter is deprecated.
          example: 12580
          format: time
        playback_url:
          type: string
          description: The HLS URL for the stream associated with the asset.
          example: >-
            https://cdn3-qa.wowza.com/2/T1R6V2hBV2hEdmJ0/ZnJUOE9q/hls/g7z7bwbz/playlist.m3u8
        total_storage_size:
          type: integer
          description: >-
            The total storage size for the asset in bytes. In this example,
            19513598 equals 19.5 megabytes.
          example: 19513598
        file_name:
          type: string
          description: >-
            The name of the mp4 file you uploaded.


            <blockquote><strong>Note:</strong> To avoid file management issues
            in storage, Wowza Video removes or replaces special characters in
            file names.</blockquote>
          example: MyAsset.mp4
        processing_percentage:
          type: integer
          description: A percentage that describes how soon transcoding will complete.
          example: 100
        player_embed_code:
          type: string
          description: >-
