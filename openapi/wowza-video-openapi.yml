    PatchVideoRequestModel:
      type: object
      properties:
        video:
          type: object
          title: video
          description: ''
          properties:
            name:
              type: string
              description: >-
                The video name. Can be displayed in the player. If not
                specified, it will default to the input file's name.
              example: My video
            description:
              type: string
              description: The video description. Can be displayed in the player.
              example: A new video for my business.
            unpublish:
              type: boolean
              description: >-
                If `true` the `unpublished_at` is respected and the video will
