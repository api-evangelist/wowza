            protocols. Each protocol has a URL for the source and a URL for each
            output rendition.
          properties:
            delivery_protocol:
              type: array
              description: The name of the direct playback protocol.
              items:
                type: object
                title: direct_playback_url
                properties:
                  name:
                    type: string
                    description: >-
                      The name of the playback URL: **source**, **default**, or
                      the output rendition's resolution.
