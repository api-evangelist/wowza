  /analytics/viewers/account:
    get:
      summary: Fetch viewer analytics data for an account
      description: >-
        (Available from version 1.11) This operation returns live and historic
        viewer data for the account related to the JSON web token used for API
        authentication. You'll use the query parameters to return live vs
        historic data, as well as specific types of viewer data. 


        **Querying live data**


        1. To get data for currently live streams, do not send **from** and
        **to** values.

        2. Use the **include** query parameter to specify what data you want to
        return, including: countries, renditions, devices, and trend data.


        If you don't send any query parameters (to, from, or include), the total
        number of viewers is returned.


        **Querying historic data**

        1. To get data for streams that ran previously, send **from** and **to**
        values.

        2. Use the **include** query parameter to specify what data you want to
        return, including: countries, renditions, devices, and trend data. 


        If you don't send **include** values, the total number of viewers is
        returned.


        If the time range between **from** and **to** query parameters is:


        <ul><li>Less than 60 minutes, the cache time between responses is 10
        seconds.</li>

        <li>More than 60 minutes, the cache time between responses is 60
        seconds.</li>
      operationId: analyticsAccountViewers
      tags:
        - analytics_viewers
      x-codeSamples:
        - lang: Shell
          source: |
            // Using cURL
            curl -H "Authorization: Bearer ${WV_JWT}" \
              
              -H "Content-Type: application/json" \
              -X "GET" \
              "${WV_HOST}/api/v2.0/analytics/viewers/account?from=2024-03-14T10:31:54.486Z&to=2024-04-13T10:31:54.486Z&include=countries,renditions,devices"
        - lang: JavaScript
          source: >
            // Using Node.js

            const https = require('https');

            const crypto = require('crypto');

            var hostname = 'api.video.wowza.com'

            var path =
            '/api/v2.0/analytics/viewers/account?from=2024-03-14T10:31:54.486Z&to=2024-04-13T10:31:54.486Z&include=countries,renditions,devices';

            //For security, never reveal API token in client-side code

            var wvJWT = 'Bearer [your JWT]';


            const options = {
              hostname: hostname,
              path: path,
              headers: {
                'Authorization': wvJWT,
                'Content-Type': 'application/json'
              }
            };

            https.get(options, function(res) {
              var body = '';
              res.on('data', function(data){
                body += data;
              });
              res.on('end', function() {
                console.log(JSON.parse(body));
              });
            }).on('error', function(e) {
              console.log(e.message);
            });
      parameters:
        - name: from
          in: query
          required: false
          description: >-
            Use this parameter, along with **to**, to return historic viewer
            data. 


            The start of the range of time you want to view. Specify
            **YYYY-DD-MMT HH:MM:SSZ** where **HH** is a 24-hour clock in UTC.
            The range queried is rounded to the nearest second. If you set the
            **from** query parameter without setting the **to** query parameter,
            the data returned will reflect 30 days starting at the from date, or
            data up to to the current day, whichever is shorter.


            Example:

            **2024-03-14T10:31:54.486Z**
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: >-
            Use this parameter, along with **from**, to return historic viewer
            data. 



            The end of the range of time you want to view. Specify **YYYY-DD-MMT
            HH:MM:SSZ** where **HH** is a 24-hour clock in UTC. The range
            queried is rounded to the nearest second. If you set the **to**
            query parameter without setting the **from** query parameter, the
            data returned will be from the past 30 days or from your last
            invoice date, whichever is shorter.


            Example:

            **2024-04-13T10:31:54.486Z**
          schema:
            type: string
            format: date-time
        - name: include
          in: query
          required: false
          description: >-
            Specify the data you want returned in the response. You can send a
            comma-separated list of values.


            Valid values are: **countries**, **renditions**, **devices**, and
            **trend**.


            Example:

            **countries,trend**
          schema:
            type: string
        - name: time_zone
