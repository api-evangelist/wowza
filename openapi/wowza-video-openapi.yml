              type: string
              description: Date and time, in ISO-8601 format, when video was updated.
              format: date-time
              example: '2024-01-01T12:33:22Z'
            state:
              type: string
              description: >
                The current state of the video. The state reflects the current
                status of the video files for the video asset. Possible states
                listed below:



                | State | Description |

                |-----------|-------|

                | UPLOADING  | The source file is currently being uploaded or
                waiting to be downloaded by our API. |

                | WAITING_FOR_ENCODER | The source file was successfully
                downloaded by the platform and is in queue to be encoded. |

                | PROCESSING  | Source file for the asset is encoding. The
                current encoding progress can be found on `encoding_progress`
                property. |

                | FINISHED | The encoding is done and the encoded files can be
                fetched. In this state it's possible to embed the video. |

                | ERROR  | If the platform, for some reason, could not download
                the source file or failed during the encoding process.
                `error_messsage` property can give more information about why it
                errored.  |

                | DELETED  | The video files have been deleted. Usually the
