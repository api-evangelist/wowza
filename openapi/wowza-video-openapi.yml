                `error_messsage` property can give more information about why it
                errored.  |

                | DELETED  | The video files have been deleted. Usually the
                video asset have been deleted when this state is reached and
                because of that it's very uncommon to see assets with this
                state. |
              example: FINISHED
            encoding_progress:
              type: number
              description: >-
                Progress of video encoding, in percentage. The the max value,
                `100`, is reached when all video files have been encoded.
              format: double
            upload_progress:
              type: number
              description: >-
                Progress of source file upload, in percentage. If the value is
                `100` the source file is uploaded.
              format: double
            error_message:
              type: string
              description: >-
                If the platform failed to encode the source file, a message
                describing the error reason will be presented in this property.
            deactivated:
              type: boolean
              description: >-
                If `true`, this video has been deactivated and is no longer
                available for embedding. This usually happens if the account was
                cancelled or trial limits were exceeded.
              default: false
            images:
              type: array
              description: >
                Images used together with the video in the platform and the
                player.


                For platform video images specified in create and update
                requests, these are uploaded and delivered through the platform.
                For remote assets the specified image URLs are just passed along
                to the player using the URL specified in the request.
              items:
                $ref: '#/components/schemas/ImageModel'
            encodings:
              type: array
              description: Array containing all available video files and their metadata.
              items:
                $ref: '#/components/schemas/EncodingModel'
            drm:
              $ref: '#/components/schemas/DRMConfigModel'
            shallow_copy:
              type: boolean
              description: >+
                Whether this video is a shallow copy of another video. A shallow
                copy uses Video files controlled by another Video, usually on
                another Workspace.



                Videos that are shallow copies can't use all features available
                for normal videos. For example, it's not possible to upload a
                new version of the video.



                Another difference is that deleting the video will not delete
                any video files. If the video asset that is the source of the
                copy is deleted, the files will no longer be available for this
                asset.

            shallow_copy_source_id:
              type: string
              description: >-
                If the video is a shallow copy, this field contains the ID of
                the source Video entity.


                Note: There are cases where it is not possible to identify the
                source and in those cases this value will be `null`.
            multiple_audio_tracks:
              type: boolean
              description: >-
                If `true`, this video has several different audio tracks
                available for the player. For example, there may be audio tracks
                in different languages.
            audio_only:
              type: boolean
              description: If `true`,  this video has no video track but only audio tracks.
            version:
              type: integer
              description: >-
                Tracks the number of times a new source file was uploaded for
                this video asset. For each time a new source file is uploaded,
                the value increases by one.
              format: int32
            thumbnails:
              $ref: '#/components/schemas/ThumbnailResponse'
            animated_previews:
              type: array
              description: The animated previews for the video.
              items:
                $ref: '#/components/schemas/AnimatedPreviewModel'
            playback_token_behavior:
              type: string
              description: >-
                Specifies the behavior of token  authentication for the video,
                determining the level of access control.  Use this security when
                distributing sensitive or valuable video content to audiences.
                It ensures that only authorized users can access the  content
                within the intended application.


                **enum:** 


                  - **NO_TOKEN:** Video files are accessible and can be downloaded and played by anyone at any time. This is the default.      


                  - **BASIC_TOKEN:** The platform automatically creates tokenized video URLs. This setting makes it hard for a viewer
                    to extract the video URL and store it for usage in unintended applications
                    over time since the embed URL, which has the token as part of the URL, 
                    will only be playable for 48 hours. The token autorenews after 48 hours
                    when used in the intended application. 


                  - **ADVANCED_TOKEN:** You add the stream's JS embed code and a token to your
                   site to provide tokenization. The protections are similar to those for the **Basic
                   Token** option except you customize the time limit, geographical limits,
                   etc. during token creation. 

                    You must either:
                      - Customize and generate a token via the Wowza Video 2.0 API to add
                       to your site before you can use this enum. You'll need to, first, generate a key id to create and 
                       sign the token.

                      - Customize and generate a standard common access token (CAT) through 
                       the means you usually use to create tokens before you can use this enum. You must, first, generate
                        a key id and key via the Wowza Video 2.0 API, to create and sign the token.

                  - **FOLLOW_DEFAULT:** The token behavior is based on the **Default Playback Token Behavior**
                    setting you select for your Wowza account. See the <a href="https://www.wowza.com/docs/org-setting-page-in-wowza-video" target="_blank">Org Settings page in Wowza Video</a> article
                    for where to set this configuration. 
              example: NO_TOKEN
            origin:
              type: object
              properties:
                id:
                  type: string
                  description: >-
                    The unique alphanumeric string that identifies the live
                    stream or the real-time stream from which the video
                    originated. Send this ID as the `origin_id` in `GET /videos`
                    to return all the videos associated with this stream.
                  example: wqrs0k75
                type:
                  type: string
                  description: The type of the stream from which the video originated.
                  example: live_stream
                  enum:
                    - live_stream
                    - real_time_stream
                uptime_id:
                  type: string
                  description: >-
                    The unique identifier associated with a specific uptime
                    period of a transcoder.


                    **Note**: `uptime_id` is returned only if the stream from
                    which the video originated is a live stream.
                  example: hvpcp3kn
              description: The origin of the video.
      description: Video Response from the Wowza Video REST API
    ReuploadVideoRequestModel:
      required:
        - input
      type: object
      properties:
        video:
          type: object
          title: video
          description: ''
          properties:
            input:
              $ref: '#/components/schemas/InputVideoRequest'
      description: >-
