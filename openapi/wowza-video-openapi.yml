    DirectInputRequest:
      required:
        - method
      type: object
      properties:
        method:
          type: string
          description: >-
            Method that video file will be provided. Indicates that you'll
            upload a video from local storage. Use the `upload_url` parameter in
            the response to do the actual upload of the video. 
          example: DIRECT
          enum:
            - DIRECT
    FetchInputRequest:
      required:
        - fetch_url
        - method
      type: object
      properties:
        method:
          type: string
          description: >-
            Method that video file will be provided. Fetches the video from the
            URL specified and makes a copy in Wowza Video.
          example: FETCH
          enum:
            - FETCH
        fetch_url:
          type: string
          description: >-
            URL to the video that the platform will download, encode, and serve
            to the player. We accept HTTP and HTTPS addresses. Required if the
            select method is `FETCH`.
          example: https://example.com/video.mp4
        fetch_image_url:
          type: string
          description: >-
            URL to an image the platform will download and serve in the player
            as poster image. We accept HTTP and HTTPS addresses. Required if the
            select method is `FETCH`.
          example: https://example.com/image.jpg
    InputVideoRequest:
      type: object
      description: >-
        Specifies the input method for uploading the video.


        There are two methods to choose from: `DIRECT` or `FETCH`. 


        Expand the `input` description, by clicking the **>** next to the
        `input` label, then click each tab to learn about the methods.


        Learn more:


        - [Upload a video from local
        storage](https://developer.wowza.com/docs/wowza-video/guides/videos/upload-a-video-locally)

        - [Upload a video from external
        storage](https://developer.wowza.com/docs/wowza-video/guides/videos/upload-a-video-external)
      oneOf:
        - $ref: '#/components/schemas/DirectInputRequest'
        - $ref: '#/components/schemas/FetchInputRequest'
    CreateVideoRequestModel:
      required:
        - input
      type: object
      properties:
        video:
          type: object
          title: video
          description: ''
          properties:
            input:
              $ref: '#/components/schemas/InputVideoRequest'
            name:
              type: string
              description: >-
                The video name. Can be displayed in the player. If not
                specified, it will default to the input file's name.
              example: My video
            description:
              type: string
              description: The video description. Can be displayed in the player.
              example: A new video for my business.
            unpublish:
              type: boolean
              description: >-
                If `true`, the `unpublished_at` is respected and the video will
                not be available after `unpublished_at`. If `false`, the video
                will not be unpublished.
              default: true
            unpublished_at:
              type: string
              description: >-
                Date and time, in ISO-8601, format when video no longer is
                available for publishing. After this date, the video is not
                visible in the player if using `ovp-plugin` to request the
                video.
              format: date-time
              example: '2025-01-01T12:33:22Z'
            published:
              type: boolean
              description: >-
                Determines, together with `published_at` and `unpublished_at`,
                if this video will be visible in public listings such as
                MRSS-feeds, endscreens and playlists. If `true`, and if
                `published_at` and `unpublished_at` allows, the video will be
                visible.
            published_at:
              type: string
              description: >-
                Date and time, in ISO-8601 format, when video is available for
                publishing. Before this date the video is not visible in the
                player if using `ovp-plugin` to request the video.
              format: date-time
              example: '2024-01-01T12:33:22Z'
            tags:
              type: array
              description: An array of tags.
              example:
                - foo
                - bar
              items:
                type: string
                description: An array of tags.
                example:
                  - foo
                  - bar
            category_id:
              type: string
              description: >-
                The unique identifier for the category that the video belongs
                to.
              default: <The account's default category>
            ad_insertion_points:
              type: array
              description: >-
                A list of ad insertion points specified for a video. Ad
                insertion points are pre-defined locations in a video where
                advertisements are placed during playback. Ads can be inserted
                at pre-roll (at the beginning of the video), mid-roll (during
                the video), or post-roll (at the end of the video) position(s).





                **Note**: Ad insertion points are only applicable for <a
                href="https://www.wowza.com/docs/get-started-with-advertising-in-wowza-video#client-side-ad-insertion-csai-%C2%A00">client-side
                ad insertion</a>. If you create mid-roll ad insertion points for
                a video, for example, they overwrite any mid-roll ad positions
                created using the <a
                href="https://www.wowza.com/docs/create-a-video-ad-serving-template-vast-ad-schedule-in-wowza-video">Video
                Ad Serving Template ad schedule</a> form. This is because the ad
                insertion points created using the Wowza Video 2.0 API are
                time-specific and more accurate than the percentages chosen in
                the Video Ad Serving Template ad schedule page.
              items:
                type: object
                description: ''
                required:
                  - offset_from_start_in_ms
                properties:
                  offset_from_start_in_ms:
                    type: integer
                    description: >-
                      Specifies the time offset from the start of the video in
                      milliseconds. This parameter determines the point in the
                      video at which the ad break begins.
                    format: int64
                    example: 20000
                  description:
                    type: string
                    description: >-
                      The description of the ad position. For example, it can be
                      an ad position in a video such as pre-roll, mid-roll, and
                      post-roll.
                    example: mid-roll
            no_ads:
              type: boolean
              description: |-
                When set to `true`, no ads will be displayed during this video. 

                **Note**: This feature only works for Iframe embeds.
            ad_keywords:
              type: string
              description: >-
                Used for replacing the `ad_keywords` macro in the VAST-tag in
                any player that plays the video. 
              example: special_ads
            playback_token_behavior:
              type: string
              description: >-
                Specifies the behavior of token  authentication for the video,
                determining the level of access control.  Use this security when
                distributing sensitive or valuable video content to audiences.
                It ensures that only authorized users can access the  content
                within the intended application.


                **enum:** 


                 - **NO_TOKEN:** Video files are accessible and can be downloaded and played by anyone at any time. This is the default.      


                 - **BASIC_TOKEN:** The platform automatically creates tokenized video URLs. This setting makes it hard for a viewer
                   to extract the video URL and store it for usage in unintended applications
                   over time since the embed URL, which has the token as part of the URL, 
                   will only be playable for 48 hours. The token autorenews after 48 hours
                   when used in the intended application. 


                 - **ADVANCED_TOKEN:** You add the stream's JS embed code and a token to your
                  site to provide tokenization. The protections are similar to those for the **Basic
                 Token** option except you customize the time limit, geographical limits,
                 etc. during token creation. 

                   You must either:
                    - Customize and generate a token via the Wowza Video 2.0 API to add
                      to your site before you can use this enum. You'll need to, first, generate a key id to create and 
                       sign the token.

                    - Customize and generate a standard common access token (CAT) through 
                        the means you usually use to create tokens before you can use this enum. You must, first, generate
                        a key id and key via the Wowza Video 2.0 API, to create and sign the token.

                 - **FOLLOW_DEFAULT:** The token behavior is based on the **Default Playback Token Behavior**
                    setting you select for your Wowza account. See the <a href="https://www.wowza.com/docs/org-setting-page-in-wowza-video" target="_blank">Org Settings page in Wowza Video</a> article
                    for where to set this configuration. 
              example: NO_TOKEN
      description: Create Video request for the Wowza Video REST API
    ImageModel:
      type: object
      properties:
        type:
          type: string
          description: >-
            Image type where valid values are `thumbnail` or `image`.
            `thumbnail` is a smaller image and `image` is larger. Size of the
            images depends on the size of the uploaded image.
          enum:
            - thumbnail
            - image
            - image_0
            - image_1
            - image_2
            - image_3
            - image_4
            - image_5
        url:
          type: string
          description: The URL to the image. We accept HTTP and HTTPS addresses.
          example: https://example.com/image.jpg
      description: >
        Images used together with the video in the platform and the player.


        For platform video images specified in create and update requests, these
        are uploaded and delivered through the platform. For remote assets, the
        specified image URLs are just passed along to the player using the URL
        specified in the request.
