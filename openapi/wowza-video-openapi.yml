    real_time_stream_create:
      type: object
      description: ''
      properties:
        real_time_stream:
          type: object
          title: real_time_stream
          description: ''
          required:
            - name
          properties:
            name:
              type: string
              description: >-
                A descriptive name for the real-time stream. Maximum 255
                characters.


                <blockquote><strong>Note:</strong>  If you record a real-time
                stream, the name is used to for the recording file name. To
                avoid file management issues in storage, Wowza Video removes or
                replaces special  characters in file names, so the recording
                file name might vary from the name you provided
                here.</blockquote>
              example: ''
            description:
              type: string
              description: An optional description of the real-time stream.
              example: ''
            disable_vod_encoder:
              type: boolean
              description: >-
                Skips VOD encoding and only creates an MP4 file for download. No
                VOD stream is created from the real-time stream. 


                Can only be set when **recording** is true and you can't change
                this value after you create the stream.


                **Default:** false


                **Example:** <code>"disable_vod_encoder": true</code>
            enable_secure_viewer:
              type: boolean
              description: |-
                Require viewers to pass a security token for playback.

                **Example:** <code>"enable_secure_viewer": false</code>
            expires_on:
              type: string
              description: >-
                The date and time the security token expires. Specify
                **YYYY-MM-DD HH:MM:SS**, where **HH** is a 24-hour clock in UTC.
                If you don't specify **HH:MM:SS**, the token expires at 12AM UTC
                on the specified day.


                Required when *enable_secure_viewer* is **true**.


                **Example:** <code>"expires_on": "2021-10-27 23:08:55
                UTC"</code>
              format: date-time
            region:
              type: string
              description: >-
                An option to set the regional server the stream is distributed
                through. Select the region closest to your broadcast location
                for the most reliable stream. If you select the auto option,
                Wowza Video selects the region based on the publisher's
                location.


                **Default:** phoenix


                **Example:** <code>"region": amsterdam</code>
              example: ''
              enum:
                - phoenix
                - amsterdam
                - singapore
                - bangalore
                - auto
            recording:
              type: boolean
              description: >-
                If **true**, records the real-time stream so you can download an
                MP4 later. The recording starts when the stream starts and stops
                automatically when the stream stops.


                Recordings for real-time streams capture up to twelve hours of
                content in a single MP4 file. If the real-time stream recording
                is longer twelve hours, you'll have multiple files for the
                recording. 


                **Default:** false


                <blockquote>Note: You can't update this value after you create
                the stream.</blockquote>


                **Example:** <code>"recording": true</code>
            reference_id:
              type: string
              description: >-
                A unique, alphanumeric ID returned in real-time stream webhook
                payloads. Setting a *reference_id* is useful if you have an ID
                in your system or application you want to associate with
                real-time stream events that trigger webhooks. Maximum 70
                characters. Can only contain: a-z A-Z 0-9 !@#$%^&*()-_+=:;,.?~|


                You can't use brackets or quotation marks.


                See <a
                href="https://www.wowza.com/docs/wowza-video-webhook-event-reference-documentation">Wowza
                Video Webhook Event Reference Documentation</a> to learn about
                webhooks.


                Available from version 1.12.


                **Example:** <code>"reference_id": "mySystemID_01"</code>
            enable_player_and_hosted_page:
              type: boolean
              description: >-
                If **true**, enables a player and hosted page for the real-time
                stream.


                **Default:** true


                <blockquote>Note: You can't update this value after you create
                the stream.</blockquote>


                **Example:** <code>"enable_player_and_hosted_page": true</code>
            player:
              type: object
              description: >-
                The **player** object is deprecated in 2.0. Create and update
                player configurations in the user interface. 


                Any values you send using the **player** object will be ignored.


                The following fields have been moved outside of the **player**
                object and reside within the **real_time_stream** object where
                you can still access them through the API:
                  * **logo_image**
                  * **logo_position**
                  * **video_poster_image**
                  * **width**
              properties:
                plugins:
                  type: object
                  description: Configuration of the plugins.
                  properties:
                    airplay:
                      type: boolean
                      description: >-
                        If **true**, enables Airplay functionality in the player
                        which allows you to cast to an Airplay device. The
                        default is **false**.


                        **Example:** <code>"airplay": false</code>
                      example: ''
                    chromecast:
                      type: boolean
                      description: >-
                        If **true**, enables Chromecast functionality in the
                        player which allows you to cast to a Chromecast device.
                        The default is **false**.


                        **Example:** <code>"chromecast": false</code>
                      example: ''
                customizations:
                  type: object
                  description: Configuration of the player customizations.
                  properties:
                    play_icon:
                      type: string
                      description: >-
                        A play icon that is displayed on the video preview. The
                        default, **solid**, uses the standard play (solid
                        triangle) icon. **outlined** uses an alternate (outlined
                        triangle) play icon. **ring** uses an alternate (small
                        solid triangle enclosed in a circle) play icon.


                        Default: **solid**


                        **Example:** <code>"play_icon": "solid"</code>
                      example: solid
                      enum:
                        - solid
                        - outlined
                        - ring
                    thin_timeline:
                      type: boolean
                      description: >-
                        If **true**, displays a thinner control bar than the
                        default in the video. The default is **false**.


                        **Example:** <code>"thin_timeline": false</code>
                      example: ''
                    drag_handle:
                      type: boolean
                      description: >-
                        If **true**, displays a drag handle on the progress bar.
                        The default is **false**.


                        **Example:** <code>"drag_handle": false</code>
                      example: ''
                    volume:
                      type: boolean
                      description: >-
                        If **true**, displays a volume button on the video. The
                        default is **true**.


                        **Example:** <code>"volume": true</code>
                      example: ''
                    mute:
                      type: boolean
                      description: >-
                        If **true**, displays a mute button on the video. The
                        default is **true**.


                        **Example:** <code>"mute": true</code>
                      example: ''
                    fullscreen:
                      type: boolean
                      description: >-
                        If **true**, displays a fullscreen button on the video.
                        The default is **true**.


                        **Example:** <code>"fullscreen": true</code>
                      example: ''
                    show_player_title:
                      type: boolean
                      description: >-
                        If **true**, displays a preview title on the video. The
                        default is **false**.


                        **Example:** <code>"show_player_title": false</code>
                      example: ''
                    color:
                      type: string
                      description: >-
                        The color of the timeline and volume bar of the player.
                        You can set the color of your choice by passing a hex
                        code for that specific color.


                        **Example:** <code>"color": "4d4d4d"</code>
                      example: ''
                video_poster_image:
                  type: string
                  description: >-
                    The path to a GIF, JPEG, or PNG poster image that appears in
                    the player before the stream begins. Poster image files must
                    be 2.5 MB or smaller.


                    **Example:** <code>"video_poster_image": "[Base64-encoded
                    string representation of GIF, JPEG, or PNG file]"</code>
                  example: ''
                logo_image:
                  type: string
                  description: >-
                    A Base64-encoded string representation of a GIF, JPEG, or
                    PNG logo  file that appears partially transparent in a
                    corner of the player throughout playback. Logo file must be
                    2.5 MB or smaller.


                    **Example:** <code>"logo_image": "[Base64-encoded string
                    representation of GIF, JPEG, or PNG file]"</code>   
                  example: ''
                logo_position:
                  type: string
                  description: >-
                    The corner of the player in which you want the player logo
                    to appear. The default is **top-left**.


                    **Example:** <code>"logo_position": "top-right"</code>
                  example: ''
                  enum:
                    - top-left
                    - top-right
                    - bottom-left
                    - bottom-right
                width:
                  type: integer
                  description: >-
                    The width, in pixels, of a fixed-size player. The default is
                    **640**.


                    **Example:** <code>"width": 640</code>
                  example: ''
                  format: int32
            player_id:
              type: string
              description: >-
                (Available from version 2.0) The unique alphanumeric string that
                identifies the player configuration to use for this stream. 
                    
                    
                When you pass a player configuration ID, Wowza Video uses that
                player configuration to customize and style the player. If you
                don't pass a value, the default player configuration for the
                account is used.


                Create and edit player configurations in the user interface. The
                ID is on the **General** tab for the player configuration.


                **Default**: Default player configuration


                **Example**: 2205b4e8-b160-43c2-868d-d88698a4e850  
            logo_image:
              type: string
              description: >-
                A Base64-encoded string representation of a GIF, JPEG, or PNG
                logo  file that appears partially transparent in a corner of the
                player throughout playback. Logo file must be 2.5 MB or smaller.


                **Example:** <code>"logo_image": "[Base64-encoded string
                representation of GIF, JPEG, or PNG file]"</code>   
              example: ''
            logo_position:
              type: string
              description: >-
                The corner of the player in which you want the player logo to
                appear. The default is **top-left**.


                **Example:** <code>"logo_position": "top-right"</code>
              example: ''
              enum:
                - top-left
                - top-right
                - bottom-left
                - bottom-right
            video_poster_image:
              type: string
              description: >-
                The path to a GIF, JPEG, or PNG poster image that appears in the
                player before the stream begins. Poster image files must be 2.5
                MB or smaller.


                **Example:** <code>"video_poster_image": "[Base64-encoded string
                representation of GIF, JPEG, or PNG file]"</code>
              example: ''
            width:
              type: integer
              description: >-
                The width, in pixels, of a fixed-size player. The default is
                **640**.


                **Example:** <code>"width": 640</code>
              example: ''
              format: int32
            hosted_page:
              type: object
              description: Configuration of the hosted page.
              properties:
                title:
                  type: string
                  description: >-
                    A title for the page that appears above the player. Can't
                    include custom HTML, JavaScript, or other tags.


                    **Example:** <code>"title": "My Hosted Page"</code>
                  example: ''
                description:
                  type: string
                  description: >-
                    A description that appears on the hosted page below the
                    player. Can't include custom HTML, JavaScript, or other
                    tags.


                    **Example:** <code>"description": "My Hosted Page
                    Description"</code>
                  example: ''
                logo_image_url:
                  type: string
                  description: >-
                    The path to a GIF, JPEG, or PNG logo file that appears in
                    the upper-left corner of the hosted page. Logo file must be
                    2.5 MB or smaller.
                  example: ''
                sharing_icons:
                  type: boolean
                  description: >-
                    Icons that let viewers share the stream on Facebook,
                    Google+, Twitter, and by email. The default, **true**,
                    includes sharing icons on the hosted page. Specify **false**
                    to omit sharing icons.


                    **Example:** <code>"sharing_icons": false</code>
                  example: ''
