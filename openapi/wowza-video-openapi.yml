        name:
          type: string
          description: A descriptive name for the schedule. Maximum 255 characters.
          example: Scheduled start for my camera
        recurrence_data:
          type: string
          description: The day or days of the week that a recurring schedule should run.
          example: monday,tuesday,wednesday,thursday,friday
          enum:
            - sunday
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
        recurrence_type:
          type: string
          description: >-
            A schedule can run one time only (**once**) or repeat (**recur**)
            until a specified *end_repeat* date. The default is **once**.
          example: recur
          enum:
            - once
            - recur
        start_repeat:
          type: string
          description: >-
            The month, day, and year that the recurring schedule should go into
            effect. Specify **YYYY-MM-DD**.
          example: '2020-02-01T00:00:00.000Z'
          format: date
        start_transcoder:
          type: string
          description: >-
            The month, day, year, and time of day that the *action_type*
            **start** should occur. Specify **YYYY-MM-DD HH:MM:SS** where **HH**
            is a 24-hour clock in UTC.
          example: '2020-02-01T00:00:00.000Z'
          format: date-time
        state:
          type: string
          description: >-
            A schedule must be **enabled** to run. Specify **enabled** to run
            the schedule or **disabled** to turn off the schedule so that it
            doesn't run.
          example: enabled
          enum:
            - enabled
            - disabled
            - expired
