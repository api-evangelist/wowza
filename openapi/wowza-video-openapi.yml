  /usage/transcoders:
    get:
      summary: Fetch usage for all transcoders
      description: >-
        This operation shows the amount of usage (egress) for all transcoders in
        the account. The default time frame is *from* the last billing date *to*
        the end of the current day.
      operationId: usageTranscodersIndex
      tags:
        - usage_transcoders
      x-codeSamples:
        - lang: Shell
          source: |
            // Using cURL
            curl -H "Authorization: Bearer ${WV_JWT}" \
              
              -H "Content-Type: application/json" \
              -X "GET" \
              "${WV_HOST}/api/v2.0/usage/transcoders"
        - lang: JavaScript
          source: |
            // Using Node.js
            const https = require('https');
            const crypto = require('crypto');
            var hostname = 'api.video.wowza.com'
            var path = '/api/v2.0/usage/transcoders';
            //For security, never reveal API token in client-side code
            var wvJWT = 'Bearer [your JWT]';

            const options = {
              hostname: hostname,
              path: path,
              headers: {
                'Authorization': wvJWT,
                'Content-Type': 'application/json'
              }
            };
            https.get(options, function(res) {
              var body = '';
              res.on('data', function(data){
                body += data;
              });
              res.on('end', function() {
                console.log(JSON.parse(body));
              });
            }).on('error', function(e) {
              console.log(e.message);
            });
      parameters:
        - name: from
          in: query
          required: false
          description: >-
            The start of the range of time you want to view. Specify
            **YYYY-MM-DD HH:00:00** where **HH** is a 24-hour clock in UTC. The
            range doesn't include minutes and seconds and rounds minutes up to
            the hour. The maximum difference between **from** and **to** is 90
            days. If you set the **from** query parameter without setting the
            **to** query parameter, the data returned will reflect 90 days
            starting at the **from** date, or data up to to the current day,
            whichever is shorter.


            You can also specify **last_bill_date**.


            **Default**: last billing date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: >-
            The end of the range of time you want to view. Specify **YYYY-MM-DD
            HH:00:00** where **HH** is a 24-hour clock in UTC. The range doesn't
            include minutes and seconds and rounds minutes up to the hour. The
            maximum difference between **from** and **to** is 90 days. If you
            set the **to** query parameter without setting the **from** query
            parameter, the data returned will be from the past 90 days or from
            your last invoice date, whichever is shorter.


            You can also specify **last_bill_date**.


            **Default**: end of the current day
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/per_page'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/usage_transcoders'
        '401':
          description: Unauthorized
