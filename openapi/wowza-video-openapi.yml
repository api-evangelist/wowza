            description:
              type: string
              description: A description for the category.
              example: This is a category description.
            parent_id:
              type: string
              description: >-
                Identifier to the parent category if one exists.



                If the category is on top level and no parent exists, the value
                is an empty string.



                **Example**: <code>"parent_id": ""</code>



                If the category is under an existing parent category, the value
                is the id of the parent category.



                **Example**: <code>"parent_id":
                "cb65a918-ad7d-406a-80d8-09c9c8d0dbb"</code>




                **Note**: When updating a category the parent can be removed by
                setting `parent_id`

                to an empty string.
              example: cb65a918-ad7d-406a-80d8-09c9c8d0dbb
    CategoryListModel:
      type: object
      properties:
