                displays:
                  type: integer
                  description: >-
                    The total number of displays for a stream at the time the
                    trend data was sampled. A display is registered when the
                    player is completely loaded and ready to play the stream.
                  example: ''
                  format: int32
                sampled_at:
                  type: string
