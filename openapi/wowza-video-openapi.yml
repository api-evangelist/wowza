                stored in. Available from version 1.7.


                **Example:** See response body sample
              items:
                $ref: '#/components/schemas/stream_target_property_fastly'
            referer_enabled:
              type: boolean
              description: >-
                If **true**, controls access to the stream from specific
                domains. The client or player requesting access to the stream
                must send the Referer header so the origin of the request can be
                validated. The default is **false**.


                **Note:** If you change *referer_enabled* to **false** after
                configuring the referer policy, then later re-enable it, you'll
                need to re-configure the other referer policy values as well.


                Available from version 1.7. For more information about the
                Referer header, see the [HTTP
                specification](https://tools.ietf.org/html/rfc7231#section-5.5.2).


                **Example:** <code>"referer_enabled": true</code>
              example: ''
            referer_allow_empty:
              type: boolean
              description: >-
                The Referer header sent by the client or player can be empty and
                not identify the origin of the request. The default is **false**
                when *referer_enabled* is **true**. While less secure, if you
                know you'll have viewers with a client or player that won't send
                a Referer header, you can specify **true** to allow an empty
                Referer header so those viewers can still access the stream.


                Available from version 1.7.


                **Example:** <code>"referer_allow_empty": true</code>
              example: ''
            referer_policy:
              type: string
              description: >-
                Specifies whether to **allow** or **deny** access to the stream
                from specific domains. The default is **allow** when
                *referer_enabled* is **true**. Specify the domains to allow or
                deny in *referer_domains*.


                Available from version 1.7.


                **Example:** <code>"referer_policy": "allow"</code>
              example: ''
              enum:
                - allow
                - deny
            referer_domains:
              type: string
              description: >-
                Domains that are either allowed or blocked from accessing the
                stream. Enter a comma-separated list of domains that are always
                allowed or denied access based on the *referer_policy* value.
                Required when *referer_enabled* is **true**.


                We recommend you enter the simplest form of the domain as
                possible, but you do need to build out the domain to the level
                of subdomains you want to allow or deny. You can fully express
                to the subdomain (_mysubdomain.example.com_) to specify that
                single, specific subdomain or you can use a wildcard (&#42;) to
                cover all subdomains at a specific level (_&#42;.example.com_).


                **Example:** _example.com, *.example.com,
                *.mysubdomain.example.com_


                If you entered the above example value for *referer_domains*,
                and *referer_policy* is **allow**, the following domains are
                allowed access to the stream: <ul> <li>https://example.com</li>
                <li>https://subdomain.example.com,
                https://subdomain2.example.com, etc.</li>
                <li>https://subdomainA.mysubdomain.example.com,
                https://subdomainB.mysubdomain.example.com, etc.</li> </ul>

                Available from version 1.7.


                **Example:** <code>"referer_domains": "example.com,
                example2.com"</code>
              example: ''
            token_auth_enabled:
              type: boolean
              description: >-
                If **true**, token authentication protects the stream by
                ensuring that it's delivered only to authorized viewers and
                can't be shared by unauthorized links or player hijacking
                attacks. The default is **false**.


                **Example:** <code>"token_auth_enabled": true</code>
              example: ''
            token_auth_shared_secret:
              type: string
              description: >-
                The shared secret of the token authentication. Must contain only
                hexadecimal characters and be an even number of total characters
                not exceeding 32.


                **Example:** <code>"token_auth_shared_secret":
                "12345678ABCDEF"</code>
              example: ''
            token_auth_playlist_only:
              type: boolean
              description: >-
                If **true**, Wowza Video uses token authentication to protect
                the master playlist only and leaves individual media playlists
                and media segments unprotected. This feature enables playback
                compatibility with media players that don’t support the
                *withCredentials* property. It may also be useful when
                addressing token auth compatibility issues with specific
                browsers. The default is **false**.


                **Note**: If you've enabled MPEG-DASH on your stream target,
                `token_auth_playlist_only` applies to both the `playlist.m3u8`
                for HLS and `manifest.mpd` for MPEG-DASH.


                **Example:** <code>"token_auth_playlist_only": true</code>
              example: ''
          example:
            name: My Updated Wowza CDN Stream Target
