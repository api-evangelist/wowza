                **Example:** <code>"logo_position": "top-right"</code>
              example: ''
              enum:
                - top-left
                - top-right
                - bottom-left
                - bottom-right
            remove_logo_image:
              type: boolean
              description: >-
                If **true**, removes the logo file from the player. The default
