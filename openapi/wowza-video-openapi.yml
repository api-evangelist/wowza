              $ref: '#/components/schemas/DRMConfigModel'
            shallow_copy:
              type: boolean
              description: >+
                Whether this video is a shallow copy of another video. A shallow
                copy uses video files controlled by another video, usually on
                another workspace.



                Videos that are shallow copies can't use all features available
                for normal videos. For example, it's not possible to upload a
                new version of the video.



