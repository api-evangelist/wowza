  /analytics/qoe/video_start_time/media/{id}:
    get:
      summary: >-
        Fetch video start time metrics for specific live streams, real-time
        streams, and videos
      description: >-
        (Available from version 2.0) This operation returns the video start time
        metrics for specific live stream(s), real-time stream(s), and/or
        video(s).
