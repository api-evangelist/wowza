            const crypto = require('crypto');

            var hostname = 'api.video.wowza.com'

            var path =
            '/api/2.0/analytics/qoe/rebuffer_count/media/7ced08dd-a744-4944-bb87-019979cb3597,6fa964ce-9515-4001-ae72-f17ae52dbf6c?from=2024-09-08T14:35:00.486Z&to=2024-10-08T14:35:00.486Z&devices=Desktop&include=trend';

            //For security, never reveal API token in client-side code

            var wvJWT = 'Bearer [your JWT]';


            const options = {
              hostname: hostname,
              path: path,
              headers: {
