            - Tag2
            - Tag3
        upload_url:
          type: string
          description: >-
            The upload location for the asset. Use this URL to upload the .mp4
            assets to the Wowza Video Asset Manager.


            Only returned when the asset is in the **uploading** state, and
            returns a new upload URL. Useful if the previous upload URL expired
            and you need a new one.
          example: >-
            https://objectstorage.us-ashburn-1.oraclecloud.com/p/k9bGRcyPFPtdeQeTRgAVTByIVVS0Z_EKrLBu3TusTrRfBuIpoDyio_ZY3qJM55tp/n/a1b2c3d4e5f6/b/recordings-qa-S7I69eYn/o/uploads/recording_bry7vv0s/MyAsset.mp4
