      parameters:
        - name: page
          in: query
          description: >-
            Returns a paginated view of results from the HTTP request. Specify a
            positive integer to indicate which page of the results should be
            displayed. The default is **1**.
          schema:
            type: integer
            format: int32
            default: 1
        - name: per_page
          in: query
          description: >-
            For use with the page parameter. Indicates how many records should
            be included in a page of results. A valid value is any positive
            integer. The default and maximum value is **1000**.
          schema:
            type: integer
            format: int32
            default: 20
        - name: created_at
          in: query
          description: >
            Filter the response based on an asset's timespan. The filter can be
            specified in following formats:


            | Spec | Description |

            |-----|-------|

            | `YYYY-MM-DD'T'HH:mm:ss`  | Returns all assets with created_at
            after the specified date |
          schema:
            type: string
          example: 2024-01-01T00:00:00+0000,2024-02-01T00:00:00+0000
        - name: updated_at
          in: query
          description: >
            Filter the response based on an asset's timespan. The filter can be
            specified in following formats:


            | Spec | Description |

            |-----|-------|

            | `YYYY-MM-DD'T'HH:mm:ss`  | Returns all assets with updated_at
            after the specified date |
          schema:
            type: string
          example: 2024-01-01T00:00:00+0000,2024-02-01T00:00:00+0000
        - name: published_at
          in: query
          description: >
            Filter the response based on an asset's timespan. The filter can be
            specified in following formats:


            | Spec | Description |

            |-----|-------|

            | `YYYY-MM-DD'T'HH:mm:ss`  | Returns all assets with published_at
            after the specified date |
          schema:
            type: string
          example: 2024-01-01T00:00:00+0000,2024-02-01T00:00:00+0000
        - name: state
          in: query
          description: >
            The current state of the video. The state reflects the current
            status of the video files for the video asset. Possible states
            listed below:



            | State | Description |

            |-----------|-------|

            | UPLOADING  | The source file is currently being uploaded or
            waiting to be downloaded by our API. |

            | WAITING_FOR_ENCODER | The source file was successfully downloaded
            by the platform and is in queue to be encoded. |

            | PROCESSING  | Source file for the asset is encoding. The current
            encoding progress can be found on `encoding_progress` property. |

            | FINISHED | The encoding is done and the encoded files can be
            fetched. In this state it's possible to embed the video. |

            | ERROR  | If the platform, for some reason, could not download the
            source file or failed during the encoding process. `error_messsage`
            property can give more information about why it errored.  |

            | DELETED  | The video files have been deleted. Usually the video
            asset have been deleted when this state is reached and because of
            that it's very uncommon to see assets with this state. |
          example: FINISHED
          schema:
            type: string
        - name: query
          in: query
          description: >
            Search multiple text fields in a search that is case insensitive and
            does not require full matches. URL encode the value of the `query`
            to ensure that it can be processed. There are free URL encoders
            online.


            It searches `name`, `description`, `tags` searches all your custom
            fields for matching terms.

            You can search specific fields by specifying them after a colon
            (`:`); if you have multiple search terms you can use `pipe` (`|`) to
            separate the search terms.


            Some examples:


            | Query | Description |

            | ----- | ----------- |

            | `query=foo` | Searches all fields for `foo`. |
          schema:
            type: string
          example: foo:name,custom_fields
        - name: sort_column
          in: query
          schema:
            type: string
            enum:
              - created_at
              - name
              - published_at
              - duration
        - name: sort_direction
          in: query
          schema:
            type: string
            enum:
              - desc
              - asc
        - name: origin_id
          in: query
          description: >-
            The unique alphanumeric string that identifies the live stream or
            the real-time stream from which the video originated.


            Returns all the videos associated with the same ID.
          schema:
            type: string
            example: edfg8k34
        - name: categories
          in: query
          description: >-
            Filters videos by specific categories. Provide one or more category
            ID(s) to retrieve only the videos that belong to those categories.

            To enter multiple category IDs, enter the IDs as a comma-separated
            list. You can specify up to four category IDs.


            **Note:** To get the ID of a category, call the GET /categories
            endpoint and choose the category ID you need.
          schema:
            type: string
            example: cb65a918-ad7d-406a-80d8-09c9c8d0dbb
