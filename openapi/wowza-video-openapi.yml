  /analytics/viewers/stream_targets/{id}/total:
    get:
      summary: Fetch total viewers analytics data for a stream target
      description: >-
        (Available from version 2.0) This operation returns the total viewers
        data for a specific stream target.



        **Querying data**



        Use the **include** query parameter to specify what data you want to
        return, including:

        countries, renditions, and devices.



        If you don't send the **include** query parameter, the total number of
        viewers is returned.
      operationId: analyticsStreamTargetTotalViewers
      tags:
        - analytics_viewers
      x-codeSamples:
        - lang: Shell
          source: |
            // Using cURL
            curl -H "Authorization: Bearer ${WV_JWT}" \
              
              -H "Content-Type: application/json" \
              -X "GET" \
              "${WV_HOST}/api/v2.0/analytics/viewers/stream_targets/tvctq36g/total?include=countries,renditions,devices"
        - lang: JavaScript
          source: >
            // Using Node.js

            const https = require('https');

            const crypto = require('crypto');

            var hostname = 'api.video.wowza.com'

            var path =
            '/api/v2.0/analytics/viewers/stream_targets/tvctq36g/total?include=countries,renditions,devices';

            //For security, never reveal API token in client-side code

            var wvJWT = 'Bearer [your JWT]';


            const options = {
              hostname: hostname,
              path: path,
              headers: {
                'Authorization': wvJWT,
                'Content-Type': 'application/json'
              }
            };

            https.get(options, function(res) {
              var body = '';
              res.on('data', function(data){
                body += data;
              });
              res.on('end', function() {
                console.log(JSON.parse(body));
              });
            }).on('error', function(e) {
              console.log(e.message);
