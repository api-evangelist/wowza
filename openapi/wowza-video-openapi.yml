    hosted_page_request_object_create:
      type: object
      description: Configuration of the hosted page.
      properties:
        enabled:
          type: boolean
          description: >-
            A web page hosted by Wowza Video that includes a player for the live
            stream. The default, **true**, creates a hosted page. Specify
            **false** to not create a hosted web page.


            **Example:** <code>"enabled": true</code>
          example: ''
        description:
          type: string
          description: >-
            A description that appears on the hosted page below the player.
            Can't include custom HTML, JavaScript, or other tags.


            **Example:** <code>"description": "My Hosted Page
            Description"</code>
          example: ''
        logo_image:
          type: string
          description: >-
            A Base64-encoded string representation of a GIF, JPEG, or PNG logo
            file that that appears in the upper-left corner of the hosted page.
            Logo file must be 2.5 MB or smaller.


            **Example:** <code>"logo_image": "[Base64-encoded string
            representation of GIF, JPEG, or PNG file]"</code>
          example: '[Base64-encoded string representation of GIF, JPEG, or PNG file]'
        sharing_icons:
          type: boolean
          description: >-
            Icons that let viewers share the stream on Facebook, Google+,
            Twitter, and by email. The default, **true**, includes sharing icons
            on the hosted page. Specify **false** to omit sharing icons.


            **Example:** <code>"sharing_icons": false</code>
          example: ''
        title:
          type: string
          description: >-
            A title for the page that appears above the player. Can't include
            custom HTML, JavaScript, or other tags.


            **Example:** <code>"title": "My Hosted Page"</code>
          example: ''
    player_request_object_create:
      type: object
      description: >-
        The **player** object is deprecated in 2.0. Create and update player
        configurations in the user interface. 


        Any values you send using the **player** object will be ignored.


        The following fields have been moved outside of the **player** object
        and reside within the **live_stream** object where you can still access
        them through the API:
          * **logo_image**
          * **logo_position**
          * **video_poster_image**
          * **width**
      properties:
        customizations:
          type: object
          description: Configuration of the player customizations.
          properties:
            play_icon:
              type: string
              description: >-
                A play icon that is displayed on the video preview. The default,
                **solid**, uses the standard play (solid triangle) icon.
                **outlined** uses an alternate (outlined triangle) play icon.
                **ring** uses an alternate (small solid triangle enclosed in a
                circle) play icon.


                Default: **solid**


                **Example:** <code>"play_icon": "solid"</code>
              example: solid
              enum:
                - solid
                - outlined
                - ring
            thin_timeline:
              type: boolean
              description: >-
                If **true**, displays a thinner control bar than the default in
                the video. The default is **false**.


                **Example:** <code>"thin_timeline": false</code>
              example: ''
            drag_handle:
              type: boolean
              description: >-
                If **true**, displays a drag handle on the progress bar. The
                default is **false**.


                **Example:** <code>"drag_handle": false</code>
              example: ''
            volume:
              type: boolean
              description: >-
                If **true**, displays a volume button on the video. The default
                is **true**.


                **Example:** <code>"volume": true</code>
              example: ''
            mute:
              type: boolean
              description: >-
                If **true**, displays a mute button on the video. The default is
                **true**.


                **Example:** <code>"mute": true</code>
              example: ''
            fullscreen:
              type: boolean
              description: >-
                If **true**, displays a fullscreen button on the video. The
                default is **true**.


                **Example:** <code>"fullscreen": true</code>
              example: ''
            show_player_title:
              type: boolean
              description: >-
                If **true**, displays a preview title on the video. The default
                is **false**.


                **Example:** <code>"show_player_title": false</code>
              example: ''
            color:
              type: string
              description: >-
                The color of the timeline and volume bar of the player. You can
                set the color of your choice by passing a hex code for that
                specific color.


                **Example:** <code>"color": "4d4d4d"</code>
              example: ''
        countdown:
          type: boolean
          description: >-
            A clock that appears in the player before the event and counts down
            to the start of the stream. Specify **true** to display the
            countdown clock. The default is **false**.


            **Example:** <code>"countdown": false</code>
          example: ''
        countdown_at:
          type: string
          description: >-
            The date and time that the event starts, used by the countdown
            clock. Specify **YYYY-MM-DD HH:MM:SS**, where **HH** is a 24-hour
            clock in UTC.


            **Example:** <code>"countdown_at": "2020-02-01T17:00:00.000Z"</code>
          example: ''
        logo_image:
          type: string
          description: >-
            A Base64-encoded string representation of a GIF, JPEG, or PNG logo 
            file that appears partially transparent in a corner of the player
            throughout playback. Logo file must be 2.5 MB or smaller.


            **Example:** <code>"logo_image": "[Base64-encoded string
            representation of GIF, JPEG, or PNG file]"</code>   
          example: ''
        logo_position:
          type: string
          description: >-
            The corner of the player in which you want the player logo to
            appear. The default is **top-left**.


            **Example:** <code>"logo_position": "top-right"</code>
          example: ''
          enum:
            - top-left
            - top-right
            - bottom-left
            - bottom-right
        plugins:
          type: object
          description: Configuration of the plugins.
          properties:
            airplay:
              type: boolean
              description: >-
                If **true**, enables Airplay functionality in the player which
                allows you to cast to an Airplay device. The default is
                **false**.


                **Example:** <code>"airplay": false</code>
              example: ''
            chromecast:
              type: boolean
              description: >-
                If **true**, enables Chromecast functionality in the player
                which allows you to cast to a Chromecast device. The default is
                **false**.


                **Example:** <code>"chromecast": false</code>
              example: ''
        responsive:
          type: boolean
          description: >-
            A player whose size adjusts according to the device on which it's
            being viewed. If **true**, creates a responsive player. If
            **false**, specify a *player_width*.


             **Example:** <code>"type": false</code>
          example: ''
        type:
          type: string
          description: >-
            The player you want to use.


            **Wowza Video subscribers**</br> Wowza Flowplayer (wowza_flowplayer)
            is the only valid option. You're a subscriber if you have access to
            Asset Management and Historic and Live Analytics in the user
            interface.


            The Wowza Flowplayer is an easy-to-use, commercial grade player
            designed for builders and developers. It provides HTML5, HLS, and
            MPEG-DASH playback and plays streams on any browser and device. It
            can be
            [customized](https://www.wowza.com/docs/embed-and-customize-wowza-flowplayer-in-your-site)
            if you embed it in your site.


            **Other subscribers**</br> original _html5 and wowza_player are the
            only valid options and original_html5 is the default.
            **original_html5** provides HTML5 playback and falls back to Flash
            on older browsers. **wowza_player** requires that
            *target_delivery_protocol* be **hls-https** and
            *closed_caption_type* be **none**.


            **Example:** <code>"type": "wowza_flowplayer"</code>
          example: ''
        video_poster_image:
          type: string
          description: >-
            The path to a GIF, JPEG, or PNG poster image that appears in the
            player before the stream begins. Poster image files must be 2.5 MB
            or smaller.


            **Example:** <code>"video_poster_image": "[Base64-encoded string
            representation of GIF, JPEG, or PNG file]"</code>
          example: ''
        width:
          type: integer
          description: >-
            The width, in pixels, of a fixed-size player. The default is
            **640**.


            **Example:** <code>"width": 640</code>
          example: ''
          format: int32
    live_stream_create_input:
      type: object
      description: ''
      required:
        - live_stream
      properties:
        live_stream:
          type: object
          title: live_stream
          description: ''
          required:
            - name
            - broadcast_location
            - encoder
          properties:
            broadcast_location:
              $ref: '#/components/schemas/broadcast_location'
            encoder:
              type: string
              description: >-
                The video source for the live stream. Choose the type of camera
                or encoder you're using to connect to the Wowza Video
                transcoder. If your specific device isn't listed, choose
                **ipcamera**, **other_rtmp**, or **other_rtsp**.
              example: other_webrtc
              enum:
                - wowza_clearcaster
                - wowza_gocoder
                - wowza_streaming_engine
                - media_ds
                - axis
                - epiphan
                - file
                - hauppauge
                - jvc
                - live_u
                - matrox
                - newtek_tricaster
                - osprey
                - sony
                - telestream_wirecast
                - teradek_cube
                - vmix
                - x_split
                - ipcamera
                - other_rtmp
                - other_rtsp
                - other_webrtc
                - other_udp
                - other_srt
            name:
              type: string
              description: A descriptive name for the live stream. Maximum 200 characters.
              example: My Live Stream
            aspect_ratio_height:
              type: integer
              description: >-
                The height, in pixels, of the video source. Should correspond to
                a widescreen (16:9) or standard (4:3) aspect ratio and be
                divisible by 8. Combined with **aspect_ratio_width**, makes up
                the input resolution.


                Default: **720**.
              example: 1080
              format: int32
            aspect_ratio_width:
              type: integer
              description: >-
                The width, in pixels, of the video source. Should correspond to
                a widescreen (16:9) or standard (4:3) aspect ratio and be
                divisible by 8. Combined with **aspect_ratio_height**, makes up
                the input resolution.


                Default: **1280**.
              example: 1920
              format: int32
            billing_mode:
              type: string
              description: >-
                The billing mode for the stream. 


                Default: **pay_as_you_go**.



                **pay_as_you_go** — Billed as a single event. A single event is
                use-based and you incur charges for the time spent streaming.


                **twentyfour_seven** — Billed as a 24x7 channel. A 24x7 channel
                is unlimited stream time for one channel. This billing mode
                doesn't incur overages, since it's unlimited.
              example: pay_as_you_go
              enum:
                - pay_as_you_go
                - twentyfour_seven
            closed_caption_type:
              type: string
              description: >-
                The type of closed caption data being passed from the source.
                The default, **none**, indicates that no data is being provided.
                **cea** indicates that a CEA closed captioning data stream is
                being provided. **on_text** indicates that an onTextData closed
                captioning data stream is being provided. **both** indicates
                that both CEA and onTextData closed captioning data streams are
                being provided.


                **Example:** <code>"closed_caption_type": "none"</code>
              example: none
              enum:
                - none
                - cea
                - on_text
                - both
            delivery_method:
              type: string
              description: >-
                The type of connection between the video source and the
                transcoder. The default, **push**, instructs the source to push
                the stream to the transcoder. **pull** instructs the transcoder
                to pull the video from the source. **cdn** uses a stream source
                to deliver the stream to the transcoder.


                Default: **push**


                **Example:** <code>"delivery_method": "pull"</code>
              example: push
              enum:
                - pull
                - cdn
                - push
            delivery_protocols:
              type: array
              description: >-
                An array of direct delivery protocols enabled for this live
                stream. By default, **rtmp**, **rtsp**, **webrtc**, and **wowz**
                are enabled.


                **Example:** See response body sample
              items:
                type: string
            description:
              type: string
              description: An optional description of the live stream.
              example: ''
            disable_authentication:
              type: boolean
              description: >-
                Authentication is required by default for RTMP and RTSP push
                connections from a video source to Wowza Video. Specify **true**
                to disable authentication with the video source.


                **Example:** <code>"disable_authentication": false</code>
              example: false
            hosted_page:
              $ref: '#/components/schemas/hosted_page_request_object_create'
            low_latency:
              type: boolean
              description: >-
                For streams whose *target_delivery_protocol* is **hls-https**.
                If **true**, turns off incoming and sort packet buffers and
                delivers smaller video packets to the player, which can reduce
                latency as long as networks can handle the increased overhead.
                The default is **false**.


                 **Example:** <code>"low_latency": false</code>
              example: false
            password:
              type: string
              description: >-
                A password for authenticating an RTMP or RTSP push connection.
                Can contain only uppercase and lowercase letters; numbers; and
                the period (.), underscore (_), and hyphen (-) characters. No
                other special characters can be used.


                **Example:** <code>"password": 68332313</code>
              example: '68332313'
            player:
              $ref: '#/components/schemas/player_request_object_create'
            player_id:
              type: string
              description: >-
                (Available from version 2.0) The unique alphanumeric string that
                identifies the player configuration to use for this stream. 


                When you pass a player configuration ID, Wowza Video uses that
                player configuration to customize and style the player. If you
                don't pass a value, the default player configuration for the
                account is used.


                Create and edit player configurations in the user interface. The
                ID is on the **General** tab for the player configuration.


                **Default**: Default player configuration


                **Example**: 2205b4e8-b160-43c2-868d-d88698a4e850
              example: ''
            logo_image:
              type: string
              description: >-
                A Base64-encoded string representation of a GIF, JPEG, or PNG
                logo  file that appears partially transparent in a corner of the
                player throughout playback. Logo file must be 2.5 MB or smaller.


                **Example:** <code>"logo_image": "[Base64-encoded string
                representation of GIF, JPEG, or PNG file]"</code>   
              example: ''
            logo_position:
              type: string
              description: >-
                The corner of the player in which you want the player logo to
                appear. The default is **top-left**.


                **Example:** <code>"logo_position": "top-right"</code>
              example: ''
              enum:
                - top-left
                - top-right
                - bottom-left
                - bottom-right
            video_poster_image:
              type: string
              description: >-
                The path to a GIF, JPEG, or PNG poster image that appears in the
                player before the stream begins. Poster image files must be 2.5
                MB or smaller.


                **Example:** <code>"video_poster_image": "[Base64-encoded string
                representation of GIF, JPEG, or PNG file]"</code>
              example: ''
            width:
              type: integer
              description: >-
                The width, in pixels, of a fixed-size player. The default is
                **640**.


                **Example:** <code>"width": 640</code>
              example: ''
              format: int32
            recording:
              type: boolean
              description: >-
                If **true**, creates a recording of the live stream. The
                recording starts when the live stream starts and stops
                automatically when the live stream stops.


                Recordings created from a live stream capture up to eight hours
                of content. If a live stream runs for longer than eight hours,
                the most recent eight hours are recorded. To record more than
                eight hours of a single broadcast, stop the live stream and
                start it again to create multiple recordings.


                Default: **false**


                > **Note**: If **save_asset** is **true**, that field overrides
                a true **recording** value and the asset is saved in Asset
                Management.


                **Example:** <code>"recording": true</code>
              example: true
            reference_id:
              type: string
              description: >-
                A unique, alphanumeric ID returned in transcoder webhook
                payloads. Setting a *reference_id* is useful if you have an ID
                in your system or application you want to associate with
                transcoder events that trigger webhooks. Maximum 70 characters.
                Can only contain: a-z A-Z 0-9 !@#$%^&*()-_+=:;,.?~|


                You can't use brackets or quotation marks.


                See <a
                href="https://www.wowza.com/docs/wowza-video-webhook-event-reference-documentation">Wowza
                Video Webhook Event Reference Documentation</a> to learn about
                webhooks.


                Available from version 1.7.


                **Example:** <code>"reference_id": "mySystemID_01"</code>
              example: mySystemID_01
            save_asset:
              type: boolean
              description: >-
                If **true**, saves an MP4 recording and a VOD asset in Asset
                Management. The default is **false**. You can't set
                **save_asset** for a live stream created from re-streaming an
                asset in Asset Management.

                > **Note**: If this value is true, **recording** and/or
                **vod_stream** are set to false. You need a Wowza Video
                subscription to access Asset Management.


                Available from version 1.8.


                **Example:** <code>"save_asset": true</code>
              example: true
            security:
              type: object
              description: >-
                Configuration of stream security. These settings only apply to
                Wowza CDN on Fastly stream targets, not Facebook Live, LinkedIn
                Live, or custom targets.
              properties:
                force_ssl_playback:
                  type: boolean
                  description: >-
                    If **true**, requires users to play the stream over HTTPS.
                    If **false**, the default, users can play the stream over
                    HTTPS or HTTP.


                    **Example:** <code>"force_ssl_playback": true</code>
                  example: ''
                geoblock_enabled:
                  type: boolean
                  description: >-
                    If **true**, controls access to the stream from specific
                    locations and, optionally, IP addresses. The default is
                    **false**.


                    **Example:** <code>"geoblock_enabled": true</code>
                  example: ''
                geoblock_by_location:
                  type: string
                  description: >-
                    Specifies whether to **allow** or **deny** access to the
                    stream from specific locations. The default is **disabled**.


                    **Example:** <code>"geoblock_location": "allow"</code>
                  example: ''
                  enum:
                    - allow
                    - deny
                    - disabled
                geoblock_country_codes:
                  type: string
                  description: >-
                    Required when *geoblock_by_location* is **allow** or
                    **deny**. The locations affected by the geo-blocking. Enter
                    a comma-separated list of capitalized two-letter ISO 3166-1
                    country codes. For a list, see [ISO
                    3166-1](https://en.wikipedia.org/wiki/ISO_3166-1) on
                    Wikipedia.


                    **Example:** <code>"geoblock_country_codes": "CA, DE"</code>
                  example: ''
                geoblock_ip_override:
                  type: string
                  description: >-
                    Specifies whether specific IP addresses can override the
                    locations that are allowed or restricted. **allow** permits
                    access from IP addresses within a location that's been
                    blocked, while **deny** restricts access from IP addresses
                    within locations that are allowed. The default is
                    **disabled**.


                    **Example:** <code>"geoblock_ip_override": "allow"</code>
                  example: ''
                  enum:
                    - allow
                    - deny
                    - disabled
                geoblock_ip_addresses:
                  type: string
                  description: >-
                    Required when *geoblock_ip_override* is **allow** or
                    **deny**. Addresses that can access or restrict the stream
                    even if they're within a specified geo-blocked location.
                    Enter a comma-separated list of up to about 40 IPv4 and IPv6
                    IP addresses that always allow or deny streaming based on
                    the *geoblock_ip_override* value. 


                    <blockquote><strong>Troubleshooting:</strong> The limit of
                    40 IP addresses is approximate because  all the security
                    information (SSL playback, geoblocking countries and IP
                    addresses, referer header,  and token auth) count toward an
                    overall metadata limit.</blockquote>


                    **Example:** <code>"geoblock_ip_addresses": "77.12.34.567,
                    78.23.45.678"</code>
                  example: ''
                token_auth_enabled:
                  type: boolean
                  description: >-
                    If **true**, token authentication protects the stream by
                    ensuring that it's delivered only to authorized viewers and
                    can't be shared by unauthorized links or player hijacking
                    attacks. The default is **false**.


                    **Example:** <code>"token_auth_enabled": true</code>
                  example: ''
                token_auth_shared_secret:
                  type: string
                  description: >-
                    The shared secret of the token authentication. Must contain
                    only hexadecimal characters and be an even number of total
                    characters not exceeding 32.


                    **Example:** <code>"token_auth_shared_secret":
                    "12345678ABCDEF"</code>
                  example: ''
                token_auth_playlist_only:
                  type: boolean
                  description: >-
                    If **true**, Wowza Video uses token authentication to
                    protect the master playlist only and leaves individual media
                    playlists and media segments unprotected. This feature
                    enables playback compatibility with media players that don’t
                    support the *withCredentials* property. It may also be
                    useful when addressing token auth compatibility issues with
                    specific browsers. The default is **false**.


                    **Note**: If you've enabled MPEG-DASH on your stream target,
                    `token_auth_playlist_only` applies to both the
                    `playlist.m3u8` for HLS and `manifest.mpd` for MPEG-DASH.


                    **Example:** <code>"token_auth_playlist_only": true</code>
                  example: ''
            source_url:
              type: string
              description: >-
                For the *delivery_method* **pull** or *encoder* **file**.


                For **pull**, enter the URL of an IP camera or video encoder
                using an RTMP and RTSP pull connection to Wowza Video. Consult
                the camera or encoder documentation for the URL syntax.


                For **file**, enter the source file URL, including the protocol
                (http, https, gs, s3).



                **Example:** <code>"source_url":
                "xyz.streamlock.net/vod/mp4:Movie.mov"</code>
              example: xyz.streamlock.net/vod/mp4:Movie.mov
            target_delivery_protocol:
              type: string
              description: >-
                The type of stream being delivered from Wowza Video. The default
                and only valid value is **hls-https**. 


                **Example:** <code>"target_delivery_protocol":
                "hls-https"</code>
              example: hls-https
              enum:
                - hls-https
            transcoder_type:
              type: string
              description: >-
                The type of transcoder, either **transcoded** for streams that
                are transcoded into adaptive bitrate renditions or
                **passthrough** for streams that aren't processed by the
                transcoder. 




                > **Note**: **passthrough** isn't supported in the
                **asia_pacific_singapore** region.




                Default: **transcoded**.
              example: transcoded
              enum:
                - transcoded
                - passthrough
            use_stream_source:
              type: boolean
              description: >-
                If **true**, uses a stream source to deliver the stream to Wowza
                Video. The default, **false**, pushes directly to Wowza Video.


                **Example:** <code>"use_stream_source": false</code>
              example: false
            username:
              type: string
              description: >-
                A user name for authenticating an RTMP or RTSP push connection.
                Can contain only uppercase and lowercase letters; numbers; and
                the period (.), underscore (_), and hyphen (-) characters. No
                other special characters can be used.


                **Example:** <code>"username": "client2"</code>
              example: client2
            vod_stream:
              type: boolean
              description: >-
                If **true**, creates a VOD stream after the live stream ends.
                The default is **false**. VOD streams require a Fastly stream
                target with HLS as a delivery protocol.

                > **Note**: If **save_asset** is **true**, that field overrides
                a true **vod_stream** value and the asset is saved in Asset
                Management.


                **Example:** <code>"vod_stream": true</code>
              example: true
            watermark:
              type: boolean
              description: >-
                Embeds an image into the transcoded stream for copyright
                protection. Specify **true** to embed a watermark image.



                **Example:** <code>"watermark": true</code>
              example: ''
            watermark_height:
