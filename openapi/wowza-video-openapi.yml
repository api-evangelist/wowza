  /analytics/ingest/live_streams/{id}:
    get:
      summary: Fetch ingest analytics data for a live stream
      description: >-
        (Available from version 1.11) This operation returns the ingest data for
        a specific live stream. You'll use the query parameters to return live
        vs historic data, as well as specific types of ingest data. 



        **Querying live data**


        To get data for currently live streams, do not send **include**,
        **from**, and **to** values.


        This operation returns a hash of metrics keys, each of which identifies
        a status, text description, unit, and value. 


        **Querying historic data**


        To get data for streams that ran previously, send **include**, **from**,
        and **to** values. 


        This operation returns a hash of metrics keys, each of which identifies
        a status, text description, unit, and value in addition to trend data.
      operationId: analyticLivestreamIngest
      tags:
        - analytics_ingest
      x-codeSamples:
        - lang: Shell
          source: |
            // Using cURL
            curl -H "Authorization: Bearer ${WV_JWT}" \
              
              -H "Content-Type: application/json" \
              -X "GET" \
              "${WV_HOST}/api/v2.0/analytics/ingest/live_streams/tvctq36g?from=2024-03-14T10:31:54.486&to=2024-04-13T10:31:54.486Z&include=trend"
        - lang: JavaScript
          source: >-
            // Using Node.js

            const https = require('https');

            const crypto = require('crypto');

            var hostname = 'api.video.wowza.com'

            var path =
            '/api/v2.0/analytics/ingest/live_streams/tvctq36g?from=2024-03-14T10:31:54.486&to=2024-04-13T10:31:54.486&include=trend';

            //For security, never reveal API token in client-side code

            var wvJWT = 'Bearer [your JWT]';


            const options = {
              hostname: hostname,
              path: path,
              headers: {
                'Authorization': wvJWT,
                'Content-Type': 'application/json'
              }
            };

            https.get(options, function(res) {
              var body = '';
              res.on('data', function(data){
                body += data;
              });
              res.on('end', function() {
                console.log(JSON.parse(body));
              });
            }).on('error', function(e) {
              console.log(e.message);
            });
      parameters:
        - name: id
          in: path
          required: true
          description: The unique alphanumeric string that identifies the live stream.
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: >-
            Use this parameter, along with **to**, to return historic viewer
            data. 


            The start of the range of time you want to view. Specify
            **YYYY-DD-MMT HH:MM:SSZ** where **HH** is a 24-hour clock in UTC.
            The range queried is rounded to the nearest second. The maximum
            difference between **from** and **to** is 90 days. If you set the
            **from** query parameter without setting the **to** query parameter,
            the data returned will reflect 30 days starting at the **from**
            date, or data up to to the current day, whichever is shorter.


            Example:

            **2023-01-14T10:31:54.486Z**
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: >-
            Use this parameter, along with **from**, to return historic viewer
            data. 



            The end of the range of time you want to view. Specify **YYYY-DD-MMT
            HH:MM:SSZ** where **HH** is a 24-hour clock in UTC. The range
            queried is rounded to the nearest second. The maximum difference
            between **from** and **to** is 90 days. If you set the **to** query
            parameter without setting the **from** query parameter, the data
            returned will be from the past 30 days or from your last invoice
            date, whichever is shorter.


            Example:

            **2023-02-14T10:31:54.486Z**
          schema:
            type: string
            format: date-time
        - name: include
          in: query
          required: false
          description: |-
            Specify the data you want returned in the response.

            Valid value is: **trend**.

            Example:
            **trend**
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/analytics_ingest_live_stream'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error403'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404'
        '410':
          description: Gone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error410'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error422'
  /usage/account:
    get:
      summary: Fetch usage for an account
      description: >-
        (Available from version 1.8) This operation returns CDN usage details
        for the account related to the JSON web token used for API
        authentication. Defaults: from = last billing date, to = end of current
        day.
      operationId: showUsageAccountIndex
      tags:
        - usage_account
      x-codeSamples:
        - lang: Shell
          source: |
            // Using cURL
            curl -H "Authorization: Bearer ${WV_JWT}" \
              
              -H "Content-Type: application/json" \
              -X "GET" \
              "${WV_HOST}/api/v2.0/usage/accounts"
        - lang: JavaScript
          source: |
            // Using Node.js
            const https = require('https');
            const crypto = require('crypto');
            var hostname = 'api.video.wowza.com'
            var path = '/api/v2.0/usage/accounts';
            //For security, never reveal API token in client-side code
            var wvJWT = 'Bearer [your JWT]';

            const options = {
              hostname: hostname,
              path: path,
              headers: {
                'Authorization': wvJWT,
                'Content-Type': 'application/json'
              }
            };
            https.get(options, function(res) {
              var body = '';
              res.on('data', function(data){
                body += data;
              });
              res.on('end', function() {
                console.log(JSON.parse(body));
              });
            }).on('error', function(e) {
              console.log(e.message);
            });
      parameters:
        - name: filter
          in: query
          required: false
          description: >-
            Restricts the data that gets returned by filtering on one or more
            values associated with a field. Construct a filter using a two-part
            expression that specifies the field on which to filter and the logic
            to use to filter.

            Keep in mind the following for account trend filters:
             <ul><li>The only valid filter is **resource**.</li>
             <li>The only valid filter operators are **eq** with values of **transcoders** or **vod_streams** or **in** with a value of **transcoders,vod_streams**. </li>
             <li>Filters use a zero-based index.</li></ul>

             For example:
              **filter[0][field]=resource&filter[0][eq]=vod_streams**
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: >-
            The start of the range of time you want to view. Specify
            **YYYY-MM-DD HH:00:00** where **HH** is a 24-hour clock in UTC. The
            range doesn't include minutes and seconds and rounds minutes up to
            the hour. The maximum difference between **from** and **to** is 90
            days. If you set the **from** query parameter without setting the
            **to** query parameter, the data returned will reflect 90 days
            starting at the **from** date, or data up to to the current day,
            whichever is shorter.


            You can also specify **last_bill_date**.


            **Default**: last billing date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: >-
            The end of the range of time you want to view. Specify **YYYY-MM-DD
            HH:00:00** where **HH** is a 24-hour clock in UTC. The range doesn't
            include minutes and seconds and rounds minutes up to the hour. The
            maximum difference between **from** and **to** is 90 days. If you
            set the **to** query parameter without setting the **from** query
            parameter, the data returned will be from the past 90 days or from
            your last invoice date, whichever is shorter.


            You can also specify **last_bill_date**.


            **Default**: end of the current day
          schema:
            type: string
            format: date-time
        - name: include
          in: query
          required: false
          description: >-
            Specify the data you want returned in the response. You can send a
            comma-separated list of values.


            Valid value is: **trend**.


