        - name: from
          in: query
          required: true
          description: >-
            The start of the range of time you want to view. Specify
            **YYYY-DD-MMT HH:MM:SSZ**  where **HH** is a 24-hour clock in UTC.
            The range queried is rounded to the nearest  second.


            Example:

            **2024-03-14T10:31:54Z**
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          description: >-
            The end of the range of time you want to view. Specify **YYYY-DD-MMT
            HH:MM:SSZ**  where **HH** is a 24-hour clock in UTC. The range
            queried is rounded to the nearest  second.


            Example:

            **2024-03-14T10:31:54Z**
          schema:
            type: string
            format: date-time
        - name: include
          in: query
          required: false
          description: |-
            The device data you want returned in the response.

            Valid value is **devices**.

            Example:
            **devices**
          schema:
            type: string
        - name: devices
          in: query
          required: false
          schema:
            type: string
          description: >-
            Specify the devices you want the returned data to reflect. If you
            don't specify a device, the returned data includes all the playback
            devices.


            Example: **Desktop**


            enum: `"Desktop"` `"Anonymized"` `"Mobile"` `"Tablet"` `"Watch"`
            `"Phone"` `"AugmentedReality"` `"VirtualReality"` `"EReader"`
            `"SetTopBox"` `"TV"` `"GameConsole"` `"HandheldGameConsole"`
            `"HomeAppliance"` `"Voice"` `"Car"` `"Cloud"` `"Robot"`
            `"RobotMobile"` `"RobotImitator"` `"Hacker"` `"Unknown"`
            `"Unclassified"` `"SmartDisplay"`
        - name: media_ids
          in: query
          required: false
          schema:
            type: string
          description: >-
            A comma separated list of IDs of the streams you want the returned
            data to reflect. 


            If **media_ids** aren't specified, then the pagination parameters,
            **limit** and **page**, are used instead to determine returned
            results. 


            Example: **abcd1234,wxyz3457**
        - name: include_recoverable
          in: query
          required: false
          schema:
            type: boolean
          description: |-
            Include recoverable errors in the response.
            Example: **true**
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: >-
            Specify the number of results to return per page. The maximum number
            of results per page is 20. The default is 10.  The minimum value is
            1. 


            Example: **15**
        - name: page
          in: query
          required: false
          schema:
            type: integer
          description: >-
            Returns a paginated view of results. Specify a positive integer to
            indicate which page of the results should be displayed.


            Pagination is determined according to the following logic:


            - If page=0, rows 1-10 are returned


            - If page=1, rows 11-20 are returned


