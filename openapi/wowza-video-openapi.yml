            src='//player.video.wowza.com/qa/xhb9jdmc/wowza.js'
            type='text/javascript'></script>\n
        hosted_page:
          type: object
          description: Configuration of the hosted page.
          properties:
            title:
              type: string
              description: >-
                A title for the page that appears above the player. Can't
                include custom HTML, JavaScript, or other tags.


                **Example:** <code>"title": "My Hosted Page"</code>
              example: My Hosted Page
            url:
              type: string
              description: >-
                The URL of the Wowza Video-hosted webpage that viewers can visit
                to watch the stream.
              example: https://embed.flowplayer.com/hosted/default/e8dk5bf6
            description:
              type: string
              description: >-
                A description that appears on the hosted page below the player.
                Can't include custom HTML, JavaScript, or other tags.


                **Example:** <code>"description": "My Hosted Page
                Description"</code>
              example: This is my hosted page.
            logo_image_url:
              type: string
              description: >-
                A Base64-encoded string representation of a GIF, JPEG, or PNG
                logo file that that appears in the upper-left corner of the
                hosted page. Logo file must be 2.5 MB or smaller.


                **Example:** <code>"logo_image": "[Base64-encoded string
                representation of GIF, JPEG, or PNG file]"</code>
              example: '[Base64-encoded string representation of GIF, JPEG, or PNG file]'
            sharing_icons:
              type: boolean
              description: >-
                Icons that let viewers share the stream on Facebook, Google+,
                Twitter, and by email. The default, **true**, includes sharing
                icons on the hosted page. Specify **false** to omit sharing
                icons.


                **Example:** <code>"sharing_icons": false</code>
              example: false
