    hosted_page_request_object:
      type: object
      description: Configuration of the hosted page.
      properties:
        enabled:
          type: boolean
          description: >-
            A web page hosted by Wowza Video that includes a player for the live
            stream. The default, **true**, creates a hosted page. Specify
            **false** to not create a hosted web page.


            **Example:** <code>"enabled": true</code>
          example: ''
        description:
          type: string
          description: >-
            A description that appears on the hosted page below the player.
            Can't include custom HTML, JavaScript, or other tags.


            **Example:** <code>"description": "My Hosted Page
            Description"</code>
          example: ''
        logo_image:
          type: string
          description: >-
            A Base64-encoded string representation of a GIF, JPEG, or PNG logo
            file that that appears in the upper-left corner of the hosted page.
            Logo file must be 2.5 MB or smaller.


            **Example:** <code>"logo_image": "[Base64-encoded string
            representation of GIF, JPEG, or PNG file]"</code>
          example: '[Base64-encoded string representation of GIF, JPEG, or PNG file]'
        remove_logo_image:
          type: boolean
          description: >-
            If **true**, removes the logo file from the hosted page. The default
            is **false**.


            **Example:** <code>"remove_logo_image": true</code>
          example: true
        sharing_icons:
          type: boolean
          description: >-
            Icons that let viewers share the stream on Facebook, Google+,
            Twitter, and by email. The default, **true**, includes sharing icons
            on the hosted page. Specify **false** to omit sharing icons.


            **Example:** <code>"sharing_icons": false</code>
          example: ''
        title:
          type: string
          description: >-
            A title for the page that appears above the player. Can't include
            custom HTML, JavaScript, or other tags.


            **Example:** <code>"title": "My Hosted Page"</code>
          example: ''
    player_request_object:
      type: object
      description: >-
        The **player** object is deprecated in 2.0. Create and update player
        configurations in the user interface. 


        Any values you send using the **player** object will be ignored.


        The following fields have been moved outside of the **player** object
        and reside within the **live_stream** object where you can still access
        them through the API:
          * **logo_image**
          * **logo_position**
          * **video_poster_image**
          * **width**
          * **remove_video_poster_image**
          * **remove_logo_image**
      properties:
        customizations:
          type: object
          description: Configuration of the player customizations.
          properties:
            play_icon:
              type: string
              description: >-
                A play icon that is displayed on the video preview. The default,
                **solid**, uses the standard play (solid triangle) icon.
                **outlined** uses an alternate (outlined triangle) play icon.
                **ring** uses an alternate (small solid triangle enclosed in a
                circle) play icon.


                Default: **solid**


                **Example:** <code>"play_icon": "solid"</code>
              example: solid
              enum:
                - solid
                - outlined
                - ring
            thin_timeline:
              type: boolean
              description: >-
                If **true**, displays a thinner control bar than the default in
                the video. The default is **false**.


                **Example:** <code>"thin_timeline": false</code>
              example: ''
            drag_handle:
              type: boolean
              description: >-
                If **true**, displays a drag handle on the progress bar. The
                default is **false**.


                **Example:** <code>"drag_handle": false</code>
              example: ''
            volume:
              type: boolean
              description: >-
                If **true**, displays a volume button on the video. The default
                is **true**.


                **Example:** <code>"volume": true</code>
              example: ''
            mute:
              type: boolean
              description: >-
                If **true**, displays a mute button on the video. The default is
                **true**.


                **Example:** <code>"mute": true</code>
              example: ''
            fullscreen:
              type: boolean
              description: >-
                If **true**, displays a fullscreen button on the video. The
                default is **true**.


                **Example:** <code>"fullscreen": true</code>
              example: ''
            show_player_title:
              type: boolean
              description: >-
                If **true**, displays a preview title on the video. The default
                is **false**.


                **Example:** <code>"show_player_title": false</code>
              example: ''
            color:
              type: string
              description: >-
                The color of the timeline and volume bar of the player. You can
                set the color of your choice by passing a hex code for that
                specific color.


                **Example:** <code>"color": "4d4d4d"</code>
              example: ''
        countdown:
          type: boolean
          description: >-
            A clock that appears in the player before the event and counts down
            to the start of the stream. Specify **true** to display the
            countdown clock. The default is **false**.


            **Example:** <code>"countdown": false</code>
          example: ''
        countdown_at:
          type: string
          description: >-
            The date and time that the event starts, used by the countdown
            clock. Specify **YYYY-MM-DD HH:MM:SS**, where **HH** is a 24-hour
            clock in UTC.


            **Example:** <code>"countdown_at": "2020-02-01T17:00:00.000Z"</code>
          example: ''
        logo_image:
          type: string
          description: >-
            A Base64-encoded string representation of a GIF, JPEG, or PNG logo 
            file that appears partially transparent in a corner of the player
            throughout playback. Logo file must be 2.5 MB or smaller.


            **Example:** <code>"logo_image": "[Base64-encoded string
            representation of GIF, JPEG, or PNG file]"</code>   
          example: ''
        logo_position:
          type: string
          description: >-
            The corner of the player in which you want the player logo to
            appear. The default is **top-left**.


            **Example:** <code>"logo_position": "top-right"</code>
          example: ''
          enum:
            - top-left
            - top-right
            - bottom-left
            - bottom-right
        plugins:
          type: object
          description: Configuration of the plugins.
          properties:
            airplay:
              type: boolean
              description: >-
                If **true**, enables Airplay functionality in the player which
                allows you to cast to an Airplay device. The default is
                **false**.


                **Example:** <code>"airplay": false</code>
              example: ''
            chromecast:
              type: boolean
              description: >-
                If **true**, enables Chromecast functionality in the player
                which allows you to cast to a Chromecast device. The default is
                **false**.


                **Example:** <code>"chromecast": false</code>
              example: ''
        remove_logo_image:
          type: boolean
          description: >-
            If **true**, removes the logo file from the player. The default is
            **false**.


            **Example:** <code>"remove_logo_image": true</code>
          example: true
        remove_video_poster_image:
          type: boolean
          description: |-
            If **true**, removes the poster image. The default is **false**.

            **Example:** <code>"remove_video_poster_image": true</code>
          example: true
        responsive:
          type: boolean
          description: >-
            A player whose size adjusts according to the device on which it's
            being viewed. If **true**, creates a responsive player. If
            **false**, specify a *player_width*.


             **Example:** <code>"type": false</code>
          example: ''
        type:
          type: string
          description: >-
            The player you want to use.


            **Wowza Video subscribers**</br> Wowza Flowplayer (wowza_flowplayer)
            is the only valid option. You're a subscriber if you have access to
            Asset Management and Historic and Live Analytics in the user
            interface.


            The Wowza Flowplayer is an easy-to-use, commercial grade player
            designed for builders and developers. It provides HTML5, HLS, and
            MPEG-DASH playback and plays streams on any browser and device. It
            can be
            [customized](https://www.wowza.com/docs/embed-and-customize-wowza-flowplayer-in-your-site)
            if you embed it in your site.


            **Other subscribers**</br> original _html5 and wowza_player are the
            only valid options and original_html5 is the default.
            **original_html5** provides HTML5 playback and falls back to Flash
            on older browsers. **wowza_player** requires that
            *target_delivery_protocol* be **hls-https** and
            *closed_caption_type* be **none**.


            **Example:** <code>"type": "wowza_flowplayer"</code>
          example: ''
        video_poster_image:
          type: string
          description: >-
            The path to a GIF, JPEG, or PNG poster image that appears in the
            player before the stream begins. Poster image files must be 2.5 MB
            or smaller.


            **Example:** <code>"video_poster_image": "[Base64-encoded string
            representation of GIF, JPEG, or PNG file]"</code>
          example: ''
        width:
          type: integer
          description: >-
            The width, in pixels, of a fixed-size player. The default is
            **640**.


            **Example:** <code>"width": 640</code>
          example: ''
          format: int32
