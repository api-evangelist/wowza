                 - **ADVANCED_TOKEN:** You add the stream's JS embed code and a token to your
                  site to provide tokenization. The protections are similar to those for the **Basic
                  Token** option except you customize the time limit, geographical limits,
                  etc. during token creation. 

                    You must either:
                     - Customize and generate a token via the Wowza Video 2.0 API to add
                       to your site before you can use this enum. You'll need to, first, generate a key id to create and 
                       sign the token.

                     - Customize and generate a standard common access token (CAT) through 
                       the means you usually use to create tokens before you can use this enum. You must, first, generate
                        a key id and key via the Wowza Video 2.0 API, to create and sign the token.

                 - **FOLLOW_DEFAULT:** The token behavior is based on the **Default Playback Token Behavior**
                  setting you select for your Wowza account. See the <a href="https://www.wowza.com/docs/org-setting-page-in-wowza-video" target="_blank">Org Settings page in Wowza Video</a> article
                   for where to set this configuration. 
              example: NO_TOKEN
            upload_url:
              type: string
              description: >-
                If input method `DIRECT` was select, this field contains the
                signed URL that will be used to upload the file.
      description: Video Response from the Wowza Video REST API
