            remove_video_poster_image:
              type: boolean
              description: |-
                If **true**, removes the poster image. The default is **false**.

                **Example:** <code>"remove_video_poster_image": true</code>
              example: true
            width:
              type: integer
              description: >-
                The width, in pixels, of a fixed-size player. The default is
                **640**.


                **Example:** <code>"width": 640</code>
              example: ''
              format: int32
            hosted_page:
              type: object
              description: Configuration of the hosted page.
              properties:
                title:
                  type: string
                  description: >-
                    A title for the page that appears above the player. Can't
