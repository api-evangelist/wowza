              format: int32
            watermark_position:
              type: string
              description: >-
                The corner of the video frame in which you want the watermark to
                appear. The default is **top-left**.


                **Example:** <code>"watermark_position": "top-left"</code>
              example: ''
              enum:
                - top-left
                - top-right
                - bottom-left
                - bottom-right
            watermark_width:
              type: integer
              description: >-
                The width, in pixels, of the watermark image. If blank, Wowza
                Video uses the original image width.


                **Example:** <code>"watermark_width": 100</code>
              example: ''
              format: int32
            countdown:
              type: boolean
              description: 'Enables or disables a countdown timer. '
              example: ''
            countdown_at:
              type: string
              description: >-
                The month, day, year, and time of day that the countdown timer
                should stop displaying to the viewer. Specify **YYYY-MM-DD 
                HH:MM:SS**.


                For example, if you set the **countdown_at** for
                **2024-12-15T17:00:00:000Z** and the **countdown_timezone** as 
                **America/New_York**, the viewer would see their current time
                minus the time remaining until the date and time you set. So, if
                there's 5 hours  to go until 1700 NYC time for the viewer, the
                viewer sees **5:00:00** on the player indicating there are 5
                hours left, then the timer counts down from there. The countdown
                starts as soon as the streamer configures it.


                Required when **countdown** is **true**.


                **Example:** <code>"countdown_at": "2024-02-01T00:00:00.000Z"
              example: '2024-02-01T00:00:00.000Z'
              format: date-time
