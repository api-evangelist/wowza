    output_input:
      type: object
      description: ''
      required:
        - output
      properties:
        output:
          type: object
          title: output
          description: ''
          required:
            - video_codec
            - audio_codec
          properties:
            video_codec:
              type: string
              description: >-
                The codec used to encode the video stream. **disabled** sends
                the stream without a video track and **passthrough** sends the
                stream without transcoding the video track. Available from
                version 1.6.
              example: h264
              enum:
                - h264
                - passthrough
                - disabled
            audio_codec:
              type: string
              description: >-
                The codec used to encode the audio stream. **disabled** sends
                the stream without an audio track and **passthrough** sends the
                stream without transcoding the audio track. **aac** is the most
                commonly compatible audio codec for protocols, while **opus** is
                for WebRTC streams. Available from version 1.6.
              example: aac
              enum:
                - aac
                - opus
                - passthrough
                - disabled
            aspect_ratio_height:
              type: integer
              description: >-
                The height, in pixels, of the output rendition. Should
                correspond to a widescreen or standard aspect ratio and be
                divisible by 8. The default is **1080**. Combined with
                **aspect_ratio_width**, makes up the input resolution.


                **Example:** <code>"aspect_ratio_height": 1080</code>
              example: 480
              format: int32
            aspect_ratio_width:
              type: integer
              description: >-
                The width, in pixels, of the output rendition. Should correspond
                to a widescreen or standard aspect ratio and be divisible by 8.
                The default is **1920**. Combined with **aspect_ratio_height**,
                makes up the input resolution.


                **Example:** <code>"aspect_ratio_width": 1920</code>
              example: 848
              format: int32
            bitrate_audio:
              type: integer
              description: >-
                The audio bitrate, in kilobits per second (Kbps). Must be
                between **1** and **9999**. If the **audio_codec** is **opus**,
                the default is **510**, otherwise the default is **128**.


                **Example:** <code>"bitrate_audio": 128</code>
              example: 128
              format: int32
            bitrate_video:
              type: integer
              description: >-
                The video bitrate, in kilobits per second (Kbps). Must be
                between **1** and **10240**. The default is **4000**.


                **Example:** <code>"bitrate_audio": 1600</code>
              example: 1600
              format: int32
            framerate_reduction:
              type: string
              description: >-
                Reduce the frame rate of the transcoded output rendition. The
                default, **0**, uses the encoded stream's frame rate without
                reduction.


                **Example:** <code>"frame_reduction": "1/2"</code>
              example: 1/2
              enum:
                - '0'
                - 1/2
                - 1/4
                - 1/25
                - 1/30
                - 1/50
                - 1/60
            h264_profile:
              type: string
              description: >-
                The encoding method. Specify **main** for desktop streaming,
                **baseline** for playback on mobile devices, or **high** for HD
                playback. The default is **high**.


                **Example:** <code>"h264_profile": "main"</code>
              example: main
              enum:
                - main
                - baseline
                - high
            keyframes:
              type: string
              description: >-
                The interval used to define the compression applied to a group
                of frames. The default, **follow_source**, uses the keyframe
                interval of the source video.


                **Example:** <code>"keyframes": "follow_source"</code>
              example: follow_source
              enum:
                - follow_source
                - '25'
                - '30'
                - '50'
                - '60'
                - '100'
                - '120'
      example:
        output:
          video_codec: h264
          audio_codec: aac
          aspect_ratio_height: 480
          aspect_ratio_width: 848
          bitrate_audio: 128
          bitrate_video: 1600
          framerate_reduction: 1/2
          h264_profile: main
          keyframes: follow_source
