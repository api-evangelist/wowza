            section: rtsp
            value: true
    transcoder_property_create_input:
      type: object
      title: property
      description: ''
      properties:
        property:
          type: object
          title: property
          description: >-

            The single property to configure. The property configuration
            consists of a key/value pair and the section of the transcoder
            configuration table the key/value pair is stored in.
          required:
            - section
            - key
            - value
          properties:
            key:
              type: string
              description: >-
                The key of the property.


                The following table lists the available property keys and what
                transcoder table section they're stored in.


                Section | Valid keys for the section

                ----------------|-------------

                **asset_management** | <ul><li>**enabled**</li></ul>
                <br/>**Note:** You need a Wowza Video subscription to access
                Asset Management.

                **cupertino** |
                <ul><li>**aes128Host**</li><li>**aes128Secret**</li></ul>

                **ezdrm** |
                <ul><li>**username**</li><li>**password**</li><li>**fairPlayAssetId**</li><li>**wideVineContentId**</li></ul>

                **file** |
                <ul><li>**repeat**</li><li>**start_streaming_at**</li></ul>

                **output** | <ul><li>**fitMode**</li><li>**record**</li></ul>

                **recording** | <ul><li>**mp4**</li></ul>

                **rtmp** | <ul><li>**allowDirectPlayback**</li></ul>

                **rtsp** |
                <ul><li>**avSyncMethod**</li><li>**debugRtspSession**</li><li>**maxRtcpWaitTime**</li><li>
                **rtpDePacketizerPacketSorterBufferTime**</li><li>**rtpDePacketizerPacketSorterFlushTime**</li><li>**rtpDePacketizerWrapper**</li><li>**rtpIgnoreSpropParameterSets**</li><li>**rtpIgnoreProfileLevelId**</li><li>**rtpTransportMode**</li><li>**rtspValidationFrequency**</li><li>**rtspFilterUnknownTracks**</li></ul>

                **srt** | <ul><li>**passPhrase**</li></ul>

                **vod_stream** |
                <ul><li>**hls**</li><li>**live2vod**</li></li></ul><br/>**Note:**
                VOD streams require a Fastly stream target with HLS as a
                delivery protocol.
              example: rtpIgnoreProfileLevelId
            section:
              type: string
              description: >-
                The section of the transcoder configuration table that contains
                the property.
              example: rtsp
              enum:
                - asset_management
                - cupertino
                - ezdrm
                - file
                - output
                - recording
                - rtmp
                - rtsp
                - srt
                - vod_stream
            value:
              type: string
              description: >-
                The value of the property.


                The following table provides information about valid values for
                each property key.


                Key(s) | Values for the key

                ----------------|-------------

                **aes128Host** | Specify the URL that devices will use to fetch
                the key to decrypt the stream.

                **aes128Secret** | Specify the 16-byte key that will be used to
                decrypt the stream. The key must be 32 characters in length and
                can only contain hex characters (a-f, A-F, 0-9). The key must
                match the key returned by the **aes128Host**.

                **enabled** | Specify **true** or **false**. Used in the
                **asset_mangement** section.

                **fitMode** | Use **letterbox**, **fit-width**, **fit-height**,
                **crop**, **stretch**, or **match-source**. The default is
                **fit-height**.

                **maxRtcpWaitTime** | Use a whole number, expressed as a string
                or an integer. The default is **2000** (ms).

                **passPhrase** | Use a string between 10-79 characters in
                length. It adds security to a live stream for an incoming SRT
                stream from your device or encoder to Wowza Video. The password
                protection secures the data payload of SRT live streams,
                ensuring that the transmitted content is encrypted and
                safeguarded against unauthorized interception during its journey
                across the network.

                **record** | Use an output ID associated with the transcoder.

                **rtpDePacketizerPacketSorterBufferTime** | Use an integer,
                expressed as a string or an integer. The default is **500**
                (ms).

                **rtpDePacketizerPacketSorterFlushTime** | Use an integer,
                expressed as a string or an integer. The default is **10** (ms).

                **rtpDePacketizerWrapper** | Use the string
                **RTPDePacketizerWrapperPacketSorter**.

                **rtpTransportMode** | Use the string **udp** or **interleave**
                (the default).

                **rtspValidationFrequency** | Use a whole number, expressed as a
                string or an integer. The default is **15000** (ms).

                **start_streaming_at** | Specify the month, day, year, and time
                of day that the file should start streaming, expressed as a
                string. Express the value by using the ISO 8601 standard of
                <strong>YYYY-MM-DDTHH:MM:SSZ</strong> where <strong>HH</strong>
                is a 24-hour clock in UTC.

                <ul><li>**username**</li><li>**password**</li><li>**fairplayAssetId**</li><li>**wideVineContentId**</li></ul>
                | Use account information and asset IDs from EZDRM. All strings.

                <ul><li>**avSyncMethod**</li><li>**debugRtspSession**</li><li>**mp4**</li><li>**repeat**</li><li>**rtspFilterUnknownTracks**</li><li>**rtpIgnoreSpropParameterSets**</li><li>**rtpIgnoreProfileLevelId**</li></ul>
                | Use **true** or **false**, expressed as a string or a Boolean.

                <ul><li>**hls**</li><li>**live2vod**</li></ul> | Use **true** or
                **false**, expressed as a string or a Boolean. When **true**,
                **hls** generates a VOD stream and **live2vod** replaces the
                live playlist with the VOD playlist after the stream ends so
                viewers can access the VOD stream on the live playback URL.
                **hls** must be **true** to enable **live2VOD**.
              example: 'true'
