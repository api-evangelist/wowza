      type: object
      description: ''
      required:
        - output_stream_target
      properties:
        output_stream_target:
          type: object
          title: output_stream_target
          description: ''
          required:
            - stream_target_id
          properties:
            stream_target_id:
              type: string
              description: >-
                The unique alphanumeric string that identifies the stream
                target.
              example: 1234abcd
            use_stream_target_backup_url:
              type: boolean
              description: >-

                Specifies whether the output stream target uses the stream
                target's primary or backup URL.


                When both the primary and backup URLs are used, Wowza Video
                sends the stream to both URLs, allowing a provider or 3rd party
                CDN to improve reliability and prevent playback disruption. If
                you want to use both URLs, make sure you add the stream target
                to the output rendition twice, once with
                *use_stream_target_backup_url* as **false** (the default) and
                once with *use_stream_target_backup_url* as **true**.


                **Example:** <code>"use_stream_target_backup_url": true</code>
              example: true
