    VideoListModel:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the video.
          example: 2aa3343e-2fb5-42c3-8671-b52c24b7c3e2
        name:
          type: string
          description: >-
            The video name. Can be displayed in the player. If not specified, it
            will default to the input file's name.
          example: My video
        description:
          type: string
          description: The video description. Can be displayed in the player.
          example: A new video for my business.
        duration_in_ms:
          type: integer
          description: Duration of the video in milliseconds.
          format: int64
        unpublish:
          type: boolean
          description: >-
            If `true`, the `unpublish_date` is respected and the video will not
            be available after `unpublish_date`. If `false`, the video will not
            be unpublished.
          default: true
        unpublished_at:
          type: string
          description: >-
            Date and time, in ISO-8601 format, when the video no longer is
            available for publishing. After this date, the video is not visible
            in the player if using `ovp-plugin` to request the video.
          format: date-time
          example: '2025-01-01T12:33:22Z'
        published:
          type: boolean
          description: >-
            This field, together with `publish_date` and `unpublish_date`,
            determines if this video will be visible in public listings such as
            MRSS-feeds, endscreens, and playlists. If `true` and `publish_date`
            and `unpublish_date` allows, the video will be visible.
        published_at:
          type: string
          description: >-
            Date and time, in ISO-8601 format, when the video is available for
            publishing. Before this date, the video is not visible in the player
            if using `ovp-plugin` to request the video.
          format: date-time
          example: '2024-01-01T12:33:22Z'
        tags:
          type: array
          description: An array of tags.
          example:
            - foo
            - bar
          items:
            type: string
            description: An array of tags.
            example:
              - foo
              - bar
        category_id:
          type: string
          description: The unique identifier for the category that the video belongs to.
          default: <The account's default category>
        no_ads:
          type: boolean
          description: |-
            When set to `true`, no ads will be displayed during this video. 

            **Note**: This feature only works for Iframe embeds.
        ad_keywords:
          type: string
          description: >-
            Used for replacing the `ad_keywords` macro in the VAST-tag in any
            player that plays the video. 
          example: special_ads
        created_at:
          type: string
          description: Date and time, in ISO-8601 format, when the video was created.
          format: date-time
          example: '2024-01-01T12:33:22Z'
        updated_at:
          type: string
          description: Date and time, in ISO-8601 format, when the video was updated.
          format: date-time
          example: '2024-01-01T12:33:22Z'
        state:
          type: string
          description: >
            The current state of the video. The state reflects the current
            status of the video files for the video asset. Possible states
            listed below:



            | State | Description |

            |-----------|-------|

            | UPLOADING  | The source file is currently being uploaded or
            waiting to be downloaded by our API. |

            | WAITING_FOR_ENCODER | The source file was successfully downloaded
            by the platform and is in queue to be encoded. |

            | PROCESSING  | Source file for the asset is encoding. The current
            encoding progress can be found on `encoding_progress` property. |

            | FINISHED | The encoding is done and the encoded files can be
            fetched. In this state it's possible to embed the video. |

            | ERROR  | If the platform, for some reason, could not download the
            source file or failed during the encoding process. `error_messsage`
            property can give more information about why it errored.  |

            | DELETED  | The video files have been deleted. Usually the video
            asset have been deleted when this state is reached and because of
            that it's very uncommon to see assets with this state. |
          example: FINISHED
        playback_token_behavior:
          type: string
          description: >-
            Specifies the behavior of token  authentication for the video,
            determining the level of access control.  Use this security when
            distributing sensitive or valuable video content to audiences. It
            ensures that only authorized users can access the  content within
            the intended application.


            **enum:** 


             - **NO_TOKEN:** Video files are accessible and can be downloaded and played by anyone at any time. This is the default.      


             - **BASIC_TOKEN:** The platform automatically creates tokenized video URLs. This setting makes it hard for a viewer
             to extract the video URL and store it for usage in unintended applications
             over time since the embed URL, which has the token as part of the URL, 
             will only be playable for 48 hours. The token autorenews after 48 hours
             when used in the intended application. 


             - **ADVANCED_TOKEN:** You add the stream's JS embed code and a token to your
              site to provide tokenization. The protections are similar to those for the **Basic
              Token** option except you customize the time limit, geographical limits,
             etc. during token creation. 

               You must either:
                 - Customize and generate a token via the Wowza Video 2.0 API to add
                 to your site before you can use this enum. You'll need to, first, generate a key id to create and 
                 sign the token.

                 - Customize and generate a standard common access token (CAT) through 
                 the means you usually use to create tokens before you can use this enum. You must, first, generate
                 a key id and key via the Wowza Video 2.0 API, to create and sign the token.

             - **FOLLOW_DEFAULT:** The token behavior is based on the **Default Playback Token Behavior**
             setting you select for your Wowza account. See the <a href="https://www.wowza.com/docs/org-setting-page-in-wowza-video" target="_blank">Org Settings page in Wowza Video</a> article
             for where to set this configuration. 
          example: NO_TOKEN
      description: List Video response from the Wowza Video REST API
