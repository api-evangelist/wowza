    analytics_qoe_error_density_account:
      type: object
      description: ''
      properties:
        account:
          type: object
          title: account
          description: ''
          properties:
            error_density:
              type: integer
              description: >-
                The average number of playback errors per playback start. A
                playback start includes the initial start of a stream as well as
                any resume events after rebuffering or user-initiated pauses.
                For example, if there are 1000 total playback errors across 500
                play sessions, the error density would be 2.
              example: ''
              format: int32
            time_zone:
              title: time_zone
              type: string
              description: >-
                The time zone in which the data is returned. The default time
                zone in which the data is returned is **Etc/UTC**.
            trend:
              type: object
              title: Array of error density trends
              description: >-
                An array of error density trend data. The granularity of sampled
                data changes based on the from and to query values you use:


                <ul><li>0 minutes to 8 hours - Samples returned per minute</li>
                <li>8 hours, 1 second to 24 hours - Samples returned per
                hour</li> <li>24 hours, 1 second to 175 days - Samples returned
                per day</li> <li>175 days to 14 years - Samples returned per
                month</li> <li>14 years or greater - Samples returned per
                year</li></ul>
              properties:
                sampled_at:
                  type: string
                  description: The date and time the trend data was sampled.
                  format: date-time
                error_density:
                  type: integer
                  description: The percentage of errors encountered during video playback.
                  example: ''
                  format: int32
            limits:
              type: object
              description: The time frame represented in the response.
              properties:
                from:
                  type: string
                  description: The start of the range of time represented in the response.
                  example: ''
                  format: date-time
                to:
                  type: string
                  description: The end of the range of time represented in the response.
                  example: ''
                  format: date-time
      example:
        account:
          error_density: 7
          time_zone: America/New_York
          trend:
            - average: 1.0,
              sampled_at: '2024-09-08T00:00:00+00:00'
            - average: 0.9829059829059829,
              sampled_at: '2024-09-11T00:00:00+00:00'
            - average: 0.806060606060606,
              sampled_at: '2024-09-13T00:00:00+00:00'
        limits:
          from: '2024-09-08T14:35:00.000Z'
          to: '2024-10-08T14:35:00.000Z'
