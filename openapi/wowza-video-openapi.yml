  /clipping:
    post:
      tags:
        - clipping
      summary: Create a clip
      description: >-
        This operation creates (or replaces) a video object in Wowza Video by
        clipping a video or live stream or, clipping and stitching together
        video or live stream clips.



        **Create a clip**


        To create a clip off of an existing video or live stream, send the `id`
        of the video or live stream you want to clip along with the
        `asset_type`, `mode`, `start`, and `stop` parameters.


        **Create clips and stitch the clips**


        To create multiple clips and stitch the clips together as one clip, send
        the `id` of the videos or live streams you want to clip along with the
        `asset_type`, `mode`, `start`, and `stop` parameters.


        **Create a clip and replace the original video**


        To create a clip and replace the original video with the clip, send the
        `replace_video_id` parameter where `replace_video_id` is the video id of
        the video to be replaced, along with the `asset_type`, `mode`, `start`,
        and `stop` parameters.


        **Note**: The replace option works only with videos and not live
        streams. The `replace_video_id` is specifically a video ID and not a
        live stream ID.


        **Caution!** Once you replace the original video with the clip, you will
        no longer be able to retrieve the original video.
      operationId: createClipStitch
