          description: >-
            The section of the transcoder configuration table that contains the
            property.
          example: ''
          enum:
            - asset_management
            - cupertino
            - ezdrm
            - file
            - output
            - recording
            - rtmp
            - rtsp
            - srt
            - vod_stream
        value:
          type: string
          description: >-
            The value of the property.


            The following table provides information about valid values for each
            property key.


            Key(s) | Values for the key

            ----------------|-------------

            **aes128Host** | Specify the URL that devices will use to fetch the
            key to decrypt the stream.

            **aes128Secret** | Specify the 16-byte key that will be used to
            decrypt the stream. The key must be 32 characters in length and can
            only contain hex characters (a-f, A-F, 0-9). The key must match the
            key returned by the **aes128Host**.

            **enabled** | Specify **true** or **false**. Used in the
            **asset_mangement** section.

            **fitMode** | Use **letterbox**, **fit-width**, **fit-height**,
            **crop**, **stretch**, or **match-source**. The default is
            **fit-height**.

            **maxRtcpWaitTime** | Use a whole number, expressed as a string or
            an integer. The default is **2000** (ms).

            **passPhrase** | Use a string between 10-79 characters in length. It
            adds security to a live stream for an incoming SRT stream from your
            device or encoder to Wowza Video. The password protection secures
            the data payload of SRT live streams, ensuring that the transmitted
            content is encrypted and safeguarded against unauthorized
            interception during its journey across the network.

            **record** | Use an output ID associated with the transcoder.

            **rtpDePacketizerPacketSorterBufferTime** | Use an integer,
            expressed as a string or an integer. The default is **500** (ms).

            **rtpDePacketizerPacketSorterFlushTime** | Use an integer, expressed
            as a string or an integer. The default is **10** (ms).

            **rtpDePacketizerWrapper** | Use the string
            **RTPDePacketizerWrapperPacketSorter**.

            **rtpTransportMode** | Use the string **udp** or **interleave** (the
            default).

            **rtspValidationFrequency** | Use a whole number, expressed as a
            string or an integer. The default is **15000** (ms).

            **start_streaming_at** | Specify the month, day, year, and time of
            day that the file should start streaming, expressed as a string.
            Express the value by using the ISO 8601 standard of
            <strong>YYYY-MM-DDTHH:MM:SSZ</strong> where <strong>HH</strong> is a
            24-hour clock in UTC.

            <ul><li>**username**</li><li>**password**</li><li>**fairplayAssetId**</li><li>**wideVineContentId**</li></ul>
            | Use account information and asset IDs from EZDRM. All strings.

            <ul><li>**avSyncMethod**</li><li>**debugRtspSession**</li><li>**mp4**</li><li>**repeat**</li><li>**rtspFilterUnknownTracks**</li><li>**rtpIgnoreSpropParameterSets**</li><li>**rtpIgnoreProfileLevelId**</li></ul>
            | Use **true** or **false**, expressed as a string or a Boolean.

            <ul><li>**hls**</li><li>**live2vod**</li></ul> | Use **true** or
            **false**, expressed as a string or a Boolean. When **true**,
            **hls** generates a VOD stream and **live2vod** replaces the live
            playlist with the VOD playlist after the stream ends so viewers can
            access the VOD stream on the live playback URL. **hls** must be
            **true** to enable **live2VOD**.
          example: ''
    transcoder_create_input:
      type: object
      description: ''
      required:
        - transcoder
      properties:
        transcoder:
          type: object
          title: transcoder
          description: ''
          required:
            - name
            - transcoder_type
            - billing_mode
            - broadcast_location
            - protocol
            - delivery_method
          properties:
            billing_mode:
              type: string
              description: >-
                The billing mode for the transcoder. The default is
                **pay_as_you_go**.


                **pay_as_you_go** — Billed as a single event. A single event is
                use-based and you incur charges for the time spent streaming.


                **twentyfour_seven** — Billed as a 24x7 channel. A 24x7 channel
                is unlimited stream time for one channel. This billing mode
                doesn't incur overages, since it's unlimited.
              example: ''
              enum:
                - pay_as_you_go
                - twentyfour_seven
            broadcast_location:
              type: string
              description: >-
                The location where Wowza Video transcodes your stream. Choose a
                location as close as possible to your video source.
              example: ''
              enum:
                - asia_pacific_australia
                - asia_pacific_india
                - asia_pacific_japan
                - asia_pacific_singapore
                - asia_pacific_s_korea
                - asia_pacific_taiwan
                - eu_belgium
                - eu_germany
                - eu_ireland
                - south_america_brazil
                - us_central_iowa
                - us_east_s_carolina
                - us_east_virginia
                - us_west_california
                - us_west_oregon
            delivery_method:
              type: string
              description: >-
                The type of connection between the source encoder and the
                transcoder. The default, **pull**, instructs the transcoder to
                pull the video from the source. **push** instructs the source to
                push the stream to the transcoder. **cdn** uses a stream source
                to deliver the stream to the transcoder.
              example: ''
              enum:
                - pull
                - cdn
                - push
            name:
              type: string
              description: A descriptive name for the transcoder. Maximum 200 characters.
              example: ''
            protocol:
              type: string
              description: >-
                The transport protocol for the source video. The default is
                **rtmp**.
              example: ''
              enum:
                - file
                - rtmp
                - rtsp
                - srt
                - udp
                - webrtc
            transcoder_type:
              type: string
              description: >-
                The type of transcoder, either **transcoded** for streams that
                are transcoded into adaptive bitrate renditions or
                **passthrough** for streams that aren't processed by the
                transcoder.




                > **Note**: **passthrough** isn't supported in the
                **asia_pacific_singapore** region.




                Default: **transcoded**
              example: ''
              enum:
                - transcoded
                - passthrough
            buffer_size:
              type: integer
              description: >-
                The size, in milliseconds, of the incoming buffer. **0** means
                no buffer. The default is **4000** (4 seconds).


                **Example:** <code>"buffer_size": 4000</code>
              example: ''
              enum:
                - 0
                - 1000
                - 2000
                - 3000
                - 4000
                - 5000
                - 6000
                - 7000
                - 8000
              format: int32
            closed_caption_type:
              type: string
              description: >-
                The type of closed caption data being passed from the source.
                The default, **none**, indicates that no data is being provided.
                **cea** indicates that a CEA closed captioning data stream is
                being provided. **on_text** indicates that an onTextData closed
                captioning data stream is being provided. **both** indicates
                that both CEA and onTextData closed captioning data streams are
                being provided.


                **Example:** <code>"closed_caption_type": "cea"</code>
              example: ''
              enum:
                - none
                - cea
                - on_text
                - both
            delivery_protocols:
              type: array
              description: >-
                An array of playback protocols enabled for this transcoder. By
                default, **rtmp**, **rtsp**, and **wowz** are returned.


                **Example:** See response body sample </code>
              items:
                type: string
            description:
              type: string
              description: >-
                An optional description of the transcoder.


                **Example:** <code>"description": "This transcoder runs our 24/7
                stream."</code>
              example: ''
            disable_authentication:
              type: boolean
              description: >-
                Authentication is required by default for RTMP and RTSP push
                connections from a video source to the transcoder. Specify
                **true** to disable authentication with the video source.


                **Example:** <code>"disable_authentication": false</code>
              example: ''
            idle_timeout:
              type: integer
              description: >-
                The amount of idle time, in seconds, before the transcoder
                automatically shuts down. Valid values are the integers **0**
                (never shuts down) to **172800** (48 hours). The default is
                **1200** (20 minutes).


                **Example:** <code>"idle_timeout": 1600</code>
              example: ''
              format: int32
            low_latency:
              type: boolean
              description: >-
                If **true**, turns off the sort packet buffer and speeds the
                time it takes to decode and deliver video data to the player.
                The default is **false**.


                **Example:** <code>"low_latency": false</code>
              example: ''
            password:
              type: string
              description: >-
                A password for authenticating an RTMP or RTSP push connection.
                Can contain only uppercase and lowercase letters; numbers; and
                the period (.), underscore (_), and hyphen (-) characters. No
                other special characters can be used.


                **Example:** <code>"password": 68332313</code>
              example: ''
            play_maximum_connections:
              type: integer
              description: >-
                The number of users who are allowed to connect directly to the
                transcoder. The minimum and default value is **10**. The maximum
                number of connections varies by the size of the transcoder, with
                the maximum value for the largest transcoder being 300 viewers.


                **Example:** <code>"play_maximum_connections": 30</code>
              example: ''
              format: int32
            properties:
              type: array
              description: >-
                An array of properties to configure. The property configuration
                consists of a key/value pair and the section of the transcoder
                configuration table the key/value pair is stored in.


                Available from version 1.5.


                **Example:** See response body sample
              items:
                $ref: '#/components/schemas/transcoder_property'
            reference_id:
              type: string
              description: >-
                A unique, alphanumeric ID returned in transcoder webhook
                payloads. Setting a *reference_id* is useful if you have an ID
                in your system or application you want to associate with
                transcoder events that trigger webhooks. Maximum 70 characters.
                Can only contain: a-z A-Z 0-9 !@#$%^&*()-_+=:;,.?~|


                You can't use brackets or quotation marks.


                See <a
                href="https://www.wowza.com/docs/wowza-video-webhook-event-reference-documentation">Wowza
                Video Webhook Event Reference Documentation</a> to learn about
                webhooks.


                Available from version 1.7.


                **Example:** <code>"reference_id": "mySystemID_01"</code>
              example: ''
            source_url:
              type: string
              description: >-
                For the *delivery_method* **pull** or *protocol* **file**.


                For **pull**, enter the source's web address without the
                protocol or the trailing slash (/).


                For **file**, enter the source file URL, including the protocol
                (http, https, gs, s3).



                **Example:** <code>"source_url":
                "xyz.streamlock.net/vod/mp4:Movie.mov"</code>
              example: ''
            stream_extension:
              type: string
              description: >-
                For the *delivery_method* **push**. Some encoders append an
                extension to their stream names. If the device you're using does
                this, enter the extension as a period (.) followed by
                alphanumeric characters.


                **Example:** <code>"stream_extension": ".sdp"</code>
              example: ''
            stream_source_id:
              type: string
              description: >-
                For the *delivery_method* **cdn**. The alphanumeric string that
                identifies the stream source that you want to use to deliver the
                stream to the transcoder.


                **Example:** <code>"stream_source_id": "rxHQQpWw"</code>
              example: ''
            suppress_stream_target_start:
              type: boolean
              description: >-
                If **true**, disables stream targets when the transcoder starts.
                If **false** (the default), the targets start when the
                transcoder starts.


                **Example:** <code>"suppress_stream_target_start": false</code>
              example: ''
            username:
              type: string
              description: >-
                A username for authenticating an RTMP or RTSP push connection.
                Can contain only uppercase and lowercase letters; numbers; and
                the period (.), underscore (_), and hyphen (-) characters. No
                other special characters can be used.


                **Example:** <code>"username": "client2"</code>
              example: ''
            watermark:
              type: boolean
              description: >-
                Embeds an image into the transcoded stream for copyright
                protection. Specify **true** to embed a watermark image.



                **Example:** <code>"watermark": true</code>
              example: ''
            watermark_height:
              type: integer
              description: >-
                The height, in pixels, of the watermark image. If blank, Wowza
                Video uses the original image height.


                **Example:** <code>"watermark_height": 80</code>
              example: ''
              format: int32
            watermark_image:
              type: string
              description: >-
                A Base64-encoded string representation of a GIF, JPEG, or PNG
                image that is embedded in all bitrate renditions of the stream.
                Watermark image files must be 2.5 MB or smaller.


                **Example:** <code>"watermark_image": "[Base64-encoded string
                representation of GIF, JPEG, or PNG file]"</code>
              example: ''
            watermark_opacity:
              type: integer
              description: >-
                The opacity, or percentage of transparency, of the watermark.
                **0** is fully transparent; **100** is fully opaque.


                **Example:** <code>"watermark_opacity": 75</code>
              example: ''
