      type: http
      scheme: bearer
      description: >-
        Your Wowza-generated access token, also called a JSON web token (JWT).
        Send it as a bearer token in the Authentication header of your requests.
        See
        [Authentication](https://www.wowza.com/docs/how-to-use-the-wowza-video-rest-api#authentication).
  parameters:
    assignable:
      name: assignable
      in: query
      description: >-
        Returns stream targets that are assignable to an output. 

        If **true**, all assignable stream targets are included in the
        response. 

        If the parameter isn't used, all assignable and unassignable stream
        targets are included in the response.




        A **primary_stream_target** is a single stream target that
        automatically 

        gets created for all output renditions (the ABR ladder) created when you
        create a live stream 

        through a live stream flow. **Primary_stream_targets** cannot be deleted
        or reassigned so they will not

        be listed when using the assignable parameter.

         Example:
         **api.video.wowza.com/api/v2.0/stream_targets?assignable=true**
      schema:
        type: boolean
    filter:
      name: filter
      in: query
      description: >-
        Restricts the data that gets returned by filtering on one or more values
        associated with a field. Construct a filter using a two-part expression
        that specifies the field on which to filter and the logic to use to
        filter. Filters use a zero-based index.


        For valid filter operators and filter fields, see [How to get filtered
        query results with the Wowza Video REST
        API](https://www.wowza.com/docs/how-to-get-filtered-query-results-with-the-wowza-video-rest-api).


        Example:

        **filter[0][field]=state&filter[0][eq]=stopped**
      schema:
        type: string
    page:
      name: page
      in: query
      description: >-
        Returns a paginated view of results from the HTTP request. Specify a
        positive integer to indicate which page of the results should be
        displayed. The default is **1**. 

         For more information and examples, see [Get paginated query results with the Wowza Video REST API](https://www.wowza.com/docs/how-to-get-paginated-query-results-with-the-wowza-video-rest-api).
      schema:
        type: integer
    per_page:
      name: per_page
      in: query
      description: >-
        For use with the *page* parameter. Indicates how many records should be
        included in a page of results. A valid value is any positive integer.
        The default and maximum value is **1000**.
      schema:
        type: integer
    next_page_key:
      name: next_page_key
      in: query
      description: >-
        (Available from version 1.5) Returns a paginated view of results from
        the HTTP request. Specify a page key ID to indicate which page of the
        results should be displayed.
      schema:
        type: string
    per_page_2.0:
      name: per_page
      in: query
      description: >-
        For use with the *next_page_key* parameter. Indicates how many records
        should be included in a page of results. A valid value is any positive
        integer. The default and maximum value is **1000**.
      schema:
        type: integer
