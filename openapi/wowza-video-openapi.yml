        logo_image_url:
          type: string
          description: >-
            The path to a GIF, JPEG, or PNG logo file that appears partially
            transparent in a corner of the player throughout playback. Logo file
            must be 2.5 MB or smaller.
          example: ''
        logo_position:
          type: string
          description: >-
            The corner of the player in which you want the player logo to
            appear. The default is **top-left**.
          example: ''
          enum:
            - top-left
            - top-right
            - bottom-left
            - bottom-right
        video_poster_image_url:
          type: string
          description: >-
            The path to a GIF, JPEG, or PNG poster image that appears in the
            player before the stream begins. Poster image files must be 2.5 MB
            or smaller.
          example: ''
        width:
          type: integer
          description: >-
            The width, in pixels, of a fixed-size player. The default is
            **640**.
          example: ''
          format: int32
        recording:
          type: boolean
          description: >-
            If **true**, creates a recording of the live stream. The recording
            starts when the live stream starts and stops automatically when the
            live stream stops.


            Recordings created from a live stream capture up to eight hours of
            content.

            If a live stream runs for longer than eight hours, the most recent
            eight hours are recorded. To record more than eight hours of a
            single broadcast, stop the live stream and start it again to create
            multiple recordings.


            Default: **false**.


            > **Note**: If **save_asset** is **true**, that field overrides a
            true **recording** value and the asset is saved in Asset Management.
          example: ''
        reference_id:
          type: string
          description: >-
            A unique, alphanumeric ID returned in transcoder webhook payloads.
            Setting a *reference_id* is useful if you have an ID in your system
            or application you want to associate with transcoder events that
            trigger webhooks. Maximum 70 characters. Can only contain: a-z A-Z
            0-9 !@#$%^&*()-_+=:;,.?~|


            You can't use brackets or quotation marks.


            See <a
            href="https://www.wowza.com/docs/wowza-video-webhook-event-reference-documentation">Wowza
            Video Webhook Event Reference Documentation</a> to learn about
            webhooks.


            Available from version 1.7.
          example: ''
        save_asset:
          type: boolean
          description: >-
            If **true**, saves an MP4 recording and a VOD asset in Asset
            Management. The default is **false**. You can't set **save_asset**
            for a live stream created from re-streaming an asset in Asset
            Management.

            > **Note**: If this value is true, **recording** and/or
            **vod_stream** are set to false. You need a Wowza Video subscription
            to access Asset Management.


            Available from version 1.8.
        security:
          type: object
          description: >-
            Configuration of stream security. These settings only apply to Wowza
            CDN on Fastly stream targets, not Facebook Live, LinkedIn Live, or
            custom targets.
          properties:
            force_ssl_playback:
              type: boolean
              description: >-
                If **true**, requires users to play the stream over HTTPS. If
                **false**, the default, users can play the stream over HTTPS or
                HTTP.
              example: ''
            geoblock_enabled:
              type: boolean
              description: >-
                If **true**, controls access to the stream from specific
                locations and, optionally, IP addresses. The default is
                **false**.
              example: ''
            geoblock_by_location:
              type: string
              description: >-
                Specifies whether to **allow** or **deny** access to the stream
                from specific locations. The default is **disabled**.
              example: ''
              enum:
                - allow
                - deny
                - disabled
            geoblock_country_codes:
              type: string
              description: >-
                Required when *geoblock_by_location* is **allow** or **deny**.
                The locations affected by the geo-blocking. Enter a
                comma-separated list of capitalized two-letter ISO 3166-1
                country codes. For a list, see [ISO
                3166-1](https://en.wikipedia.org/wiki/ISO_3166-1) on Wikipedia.
              example: ''
            geoblock_ip_override:
              type: string
              description: >-
                Specifies whether specific IP addresses can override the
                locations that are allowed or restricted. **allow** permits
                access from IP addresses within a location that's been blocked,
                while **deny** restricts access from IP addresses within
                locations that are allowed. The default is **disabled**.
              example: ''
              enum:
                - allow
                - deny
                - disabled
            geoblock_ip_addresses:
              type: string
              description: >-
                Required when *geoblock_ip_override* is **allow** or **deny**.
                Addresses that can access or restrict the stream even if they're
                within a specified geo-blocked location. Enter a comma-separated
                list of IPv4 and IPv6 IP addresses that always allow or deny
                streaming based on the *geoblock_ip_override* value.
              example: ''
            token_auth_enabled:
              type: boolean
              description: >-
                If **true**, token authentication protects the stream by
                ensuring that it's delivered only to authorized viewers and
                can't be shared by unauthorized links or player hijacking
                attacks. The default is **false**.
              example: ''
            token_auth_shared_secret:
              type: string
              description: >-
                The shared secret of the token authentication. Must contain only
                hexadecimal characters and be an even number of total characters
                not exceeding 32.
              example: ''
            token_auth_playlist_only:
              type: boolean
              description: >-
                If **true**, Wowza Video uses token authentication to protect
                the master playlist only and leaves individual media playlists
                and media segments unprotected.  This feature enables playback
                compatibility with media players that don’t support the
                *withCredentials* property. It may also be useful when
                addressing  token auth compatibility issues with specific
                browsers. The default is **false**.


                **Note**: If you've enabled MPEG-DASH on your stream target,
                `token_auth_playlist_only` applies to both the `playlist.m3u8`
                for HLS and `manifest.mpd` for MPEG-DASH.
              example: ''
        source_connection_information:
          type: object
          description: >-
            Details that you can use to manually configure and connect a video
            source to the live stream.
          example: ''
        state:
          type: string
          description: The state of the live stream.
          example: started
          enum:
            - starting
            - stopping
            - started
            - stopped
            - resetting
        stream_source_id:
          type: string
          description: >-
            The unique alphanumeric string that identifies the stream source, if
            a stream source is used.
          example: ''
        stream_targets:
          type: array
          description: >-
            An array of unique alphanumeric strings that identify the stream
            targets used by the live stream. A **primary_stream_target** is a
            single stream target that automatically gets created for all output
            renditions (the ABR ladder) created when you create a live stream
            through a live stream flow. The **primary_stream_target** cannot be
            deleted or reassigned.
          items:
            type: object
            title: stream_targets
            properties:
              id:
                type: string
                description: >-
                  The unique alphanumeric string that identifies the stream
                  target.
                example: dcxq5q6c
        target_delivery_protocol:
          type: string
          description: >-
            The type of stream being delivered from Wowza Video. The default and
            only valid value is **hls-https**.
          example: ''
          enum:
            - hls-https
        transcoder_type:
          type: string
          description: >-
            The type of transcoder, either **transcoded** for streams that are
            transcoded into adaptive bitrate renditions or **passthrough** for
            streams that aren't processed by the transcoder. 




            > **Note**: **passthrough** isn't supported in the
            **asia_pacific_singapore** region.




            Default: **transcoded**.
          example: ''
          enum:
            - transcoded
            - passthrough
        updated_at:
          type: string
          description: The date and time that the live stream was updated.
          example: ''
          format: date-time
        use_stream_source:
          type: boolean
          description: >-
            If **true**, uses a stream source to deliver the stream to Wowza
            Video. The default, **false**, pushes directly to Wowza Video.
          example: ''
        vod_stream:
          type: boolean
          description: >-
            If **true**, creates a VOD stream after the live stream ends. The
            default is **false**. VOD streams require a Fastly stream target
            with HLS as a delivery protocol.

            > **Note**: If **save_asset** is **true**, that field overrides a
            true **vod_stream** value and the asset is saved in Asset
            Management.
          example: ''
        watermark:
          type: boolean
          description: >-
