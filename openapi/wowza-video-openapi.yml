                to an empty string.
              example: cb65a918-ad7d-406a-80d8-09c9c8d0dbb
    CreatePlaybackTokenKeyRequestWrapper:
      type: object
      description: Create playback token key for the Wowza Video REST API
      properties:
        playback_token_key:
          type: object
          $ref: '#/components/schemas/CreatePlaybackTokenKeyRequestModel'
    CreatePlaybackTokenKeyRequestModel:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          description: The name of the playback token key for the organization.
          example: Key name
    CreatePlaybackTokenKeyResponseWrapper:
      type: object
      description: Create playback token key for the Wowza Video REST API
      properties:
        playback_token_key:
          type: object
          $ref: '#/components/schemas/CreatePlaybackTokenKeyResponseModel'
    CreatePlaybackTokenKeyResponseModel:
      type: object
      properties:
        id:
          type: string
          description: >-
            Unique identifier for the playback token key. The id will contain
            the organization id in the key id.
          example: 51cd5c07-1583-4f5e-bd81-f1aa11510ea9
        organization_id:
          type: string
          description: The organization id for Wowza Video.
          example: 123456
        name:
          type: string
          description: The name of the key for the organization.
          example: key name
        created_at:
          type: string
          description: The key creation timestamp.
          format: date-time
          example: '2020-01-01T12:33:22Z'
        value:
          type: string
          description: >-
            The key value for the key.


            If you generate a playback token for advanced token authentication
            by creating a  standard common access token (CAT) through the means
            you usually use to create tokens, you'll need to add this key value
            during token creation to sign the token. The key  value is only
            returned in this endpoint to keep it in a place that you can access
            it later when you create your playback token. 
    ListPlaybackTokenKeyResponseWrapper:
      type: object
      properties:
        playback_token_keys:
          type: array
          description: The list of playback token keys.
          items:
            $ref: '#/components/schemas/PlaybackTokenKeyResponseModel'
        pagination:
          type: object
          description: Page information for the results generated by the query.
          properties:
            payload_version:
              type: integer
              description: The pagination object version.
            total_records:
              type: integer
              description: >-
                The total number of records in the database that match the
                query.
              example: ''
            page:
              type: integer
              description: The page number, starting at 1. The default is 1.
              example: ''
            per_page:
              type: integer
              description: The number of records included per page. The default is 20.
              example: ''
            total_pages:
              type: integer
              description: The total number of pages generated by the query.
              example: ''
            page_first_index:
              type: integer
              description: The index of the first record in the response.
              example: ''
            page_last_index:
              type: integer
              description: The index of the last record in the response.
              example: ''
    PlaybackTokenKeyResponseModel:
      properties:
        id:
          type: string
          description: >-
            Unique identifier for the playback token key. It will contain the
            organization identifier.
        organization_id:
          type: string
          description: The organization id.
        name:
          type: string
          description: The name of the playback token key for the organization.
        created_at:
          type: string
          description: The playback token creation timestamp.
          format: date-time
          example: '2020-01-01T12:33:22Z'
    GenerateTokenRequest:
      required:
        - exp
        - key_id
      type: object
      properties:
        key_id:
          type: string
          description: >-
            The unique identifier for the id key returned when you used the POST
            /playback_tokens/keys endpoint to create a playback token key. This
            key will sign the token you create.
          example: 51cd5c07-1583-4f5e-bd81-f1aa11510ea9
        exp:
          type: integer
          description: >-
            The expiration time of the token which is the <a
            href="https://www.unixtimestamp.com/" target="_blank">unix
            timestamp</a> in seconds. If the current time is greater than the
            expiration time, the request will be considered invalid.
          format: int64
          example: 1679816499
        nbf:
          type: integer
          description: >-
            The time before which the token must not be accepted for processing
            which is the <a href="https://www.unixtimestamp.com/"
            target="_blank">unix timestamp</a> in seconds.
          format: int64
          example: 1679816499
        iat:
          type: integer
          description: >-
            The issue date of the token which is the <a
            href="https://www.unixtimestamp.com/" target="_blank">unix
            timestamp</a> in seconds.
          format: int64
          example: 1679816499
        iss:
          type: string
          description: The issuer of the token.
          example: my-issuer
        sub:
          type: string
          description: The subject of the token.
          example: subscriber1234
        aud:
          type: string
          description: The audience of the token.
          example: my-audience
        cti:
          type: string
          description: Uniquely identifies a token to help prevent reuse or replay attacks.
          example: unique-token-id
        catnip:
          type: array
          description: >-
            The IP address of the network for which the token was issued. The
            array contains objects with tag and value.  Each object represents a
            catnip claim. 


            The max number of items allowed is 5 and the minimum is zero. 
          items:
            $ref: '#/components/schemas/CatnipClaim'
        catu:
          type: object
          description: >-
            A map of URIs to which the token applies. The maximum number of
            items allowed is five.  The object contains an array of key and
            value. 
          additionalProperties:
            type: array
            description: >-
              The object contains an array of keys and values. 


               - Each key represents a URI component and must be between 0-8. 


               - The value is a list of URIs. The first element of the value (match type) must be one of 0,1,2,3. The second element must be a string. 


              **Examples based on tables below**: 
               - "1": [0, "token.dotv.wowza.com"]          //Host (exact match)
               - "3": [3, "ssai"]          //Path (contains match)


              <details> <summary>Click to expand for the full list of valid
              values</summary>

               | Key |  URI Component | RFC Reference |
               |---|---|---|
               | 0 | Scheme                    | RFC 3986 Section 3.1   |
               | 1 | Host                      | RFC 3986 Section 3.2.2 |
               | 2 | Port                      | RFC 3986 Section 3.2.3 |
               | 3 | Path                      | RFC 3986 Section 3.3   |
               | 4 | Query                     | RFC 3986 Section 3.4   |
               | 5 | Parent Path               | -                      |
               | 6 | Filename                  | -                      |
               | 7 | Stem                      | -                      |
               | 8 | Extension                 | -                      |
              </details>

              <details> <summary>Click to expand for the full list of valid
              values</summary>

               | Value |Match Type          |
               |---|---|
               | 0     | Exact Text Match   |
               | 1     | Prefix Match       |
               | 2     | Suffix Match       |
               | 3     | Contains Match     |
              </details>
        catgeoiso3166:
          type: array
          description: >-
            The ISO3166 country codes from which the token was issued.
            Optionally, followed by a hyphen and a region code. the maximum
            number allowed is five. 
          items:
            type: string
            example:
              - US
              - CA-ON
        catv:
          type: integer
          description: The version of the token. The integer must be 1.
          format: int323
          example: 1
    CatnipClaim:
      type: object
      properties:
        tag:
          type: integer
          description: The tag must be 52 (IPV4 address) or 54 (IPV6 address).
          format: int32
          example: 52
        value:
          type: array
          description: >-
            A two-element array:


              1. two-element array:
                 - For IPv4, must be < 24. 
                 - For IPv6, must be < 56. 
              2. An object whose keys are byte-indices ("0", "1", ...) and values are the byte values.


            You must have a minimum of two items and can have a maximum of two
            items. 
          items:
            - type: integer
              description: The IP-prefix length.
            - type: object
              description: 'Byte-map of the IP-prefix.  '
              additionalProperties:
                type: integer
                description: The byte value (0-255)
          example:
            - 24
            - '0': 188
              '1': 4
              '2': 23
    GenerateTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: >-
            The unique identifier for the playback token. 


            Add this token to your site along with the JS-embed for the video to
            use advanced token authentication. You must also use PATCH
            /videos/{id} to select **ADVANCED_TOKEN** as your authentication
            type for the video after you create the playback token. 
    CreateClipStitch:
      required:
        - mode
        - clips
      type: object
      properties:
        clips:
          type: array
          description: >-
            Represents an array of videos or live streams to be included in the
            clip/stitch operation. If you include only one video or live stream,
            it is clipped based on `start` and `stop`. If you include more than
            one video or live stream, they are clipped based on `start` and
            `stop`, and stitched as one clip.
          items:
            required:
              - id
              - asset_type
            type: object
            title: clips
            properties:
              id:
                type: string
                description: >-
                  Specifies the id of the video or live stream to be clipped
                  and/or stitched.
                example: 73a0c613-8972-14cd-9d0c-3c993bddb388
              asset_type:
                type: string
                description: Specifies the asset type.
                example: VOD
                enum:
                  - VOD
                  - LIVE_STREAM
              start:
                type: string
                description: >-
                  Starting time of the video segment in 24-hour format with
                  frame precision (HH:MM:SS:FF). If omitted, video starts from
                  the beginning.


                  If you are clipping a live stream, the start time of the
                  stream must be in ISO-8601 format, which is
                  YYYY-MM-DDThh:mm:ssZ.
                example: '00:01:20:00'
              stop:
                type: string
                description: >-
                  Ending time of the video segment in 24-hour format with frame
                  precision (HH:MM:SS:FF). If omitted, video continues until its
                  natural end.


                  If you are clipping a live stream, the end time of the stream
                  must be in ISO-8601 format, which is YYYY-MM-DDThh:mm:ssZ.
                example: '00:05:25:00'
        mode:
          type: string
          description: >-
            Specifies the mode for clipping/stitching operations. In `QUICK`
            mode, clipping can only be performed on segment breakpoints,
            optimizing for speed. For example, for a video or live stream that
            has 8-second interval breakpoint, if you specify a breakpoint
            outside the 8-second interval, the breakpoint is defaulted to the
            closest 8-second breakpoint. If you set your `start` as 00:00:10:00
            (HH:MM:SS:FF), it will set your `start` to 00:00:08:00
            ((HH:MM:SS:FF). In `PRECISE` mode, clipping can be performed on the
            frame level, ensuring higher accuracy but requiring more processing
            time. `PRECISE` mode incurs additional encoding time and cost.


            **Note**: If you are clipping or stitching live streams, the `start`
            and `stop` times must be in ISO-8601 format, which is
            YYYY-MM-DDThh:mm:ssZ.
          example: PRECISE
          enum:
            - QUICK
            - PRECISE
        name:
          type: string
          description: >-
            A descriptive name of the video that's displayed in the player. If
            not specified, it will default to the input file's name.
          example: My video
        description:
          type: string
          description: A description of the video that's displayed in the player.
          example: A new video for my business.
        category_id:
          type: string
          description: The unique identifier for the category that the video belongs to.
          default: <The account's default category>
        tags:
          type: array
          description: A list of tags.
          example:
            - foo
            - bar
          items:
            type: string
            description: A list of tags.
            example:
              - foo
              - bar
        published_at:
          type: string
          description: >-
            Date and time, in ISO-8601 format, when video is available for
            publishing. Before this date the video is not visible in the player
            if using
            [ovp-plugin](https://developer.wowza.com/docs/wowza-flowplayer/plugins/wowza-video-platform-integration/)
            to request the video.
          format: date-time
          example: '2024-05-01T12:33:22Z'
        published:
          type: boolean
          description: >-
            Determines, together with `published_at` and `unpublished_at`, if
            this video will be visible in public listings such as MRSS-feeds,
            endscreens, and playlists. If `true`, and if `published_at` and
            `unpublished_at` allow, the video will be visible.
        unpublish:
          type: boolean
          description: >-
            If `true`, the `unpublished_at` is respected and the video will not
            be available after `unpublished_at`. If `false`, the video will not
            be unpublished.
          default: false
        unpublished_at:
          type: string
          description: >-
            Date and time, in ISO-8601, format when video no longer is available
            for publishing. After this date, the video is not visible in the
            player if using
            [ovp-plugin](https://developer.wowza.com/docs/wowza-flowplayer/plugins/wowza-video-platform-integration/)
            to request the video.
          format: date-time
          example: '2025-01-01T12:33:22Z'
        no_ads:
          type: boolean
          description: |-
            When set to `true`, no ads will be displayed during this video. 

            **Note**: This feature only works for Iframe embeds.
        ad_keywords:
          type: string
          description: >-
            Used for replacing the `ad_keywords` macro in the VAST-tag in any
            player that plays the video. 
          example: special_ads
        replace_video_id:
          type: string
          description: >-
            Specifies the video id of the video to be replaced by the
            clip/stitch operation. If the video id is not provided, a new video
            will be created.


            **Caution!** Once you replace the original video with the clip, you
            will no longer be able to retrieve the original video.
    CreateClipStitchRequestModel:
      type: object
      description: Create clip/stitch request for the Wowza Video REST API
      properties:
        clipping:
          type: object
          $ref: '#/components/schemas/CreateClipStitch'
    CreateClipStitchResponseModel:
      type: object
      properties:
        video:
          type: object
          title: video
          description: ''
          properties:
            id:
              type: string
              description: >-
                Specifies the id of the video that is clipped or stitched based
                on the live stream(s) or video(s) sent in the request.
              example: 73a0c613-8972-14cd-9d0c-3c993bddb388
            name:
              type: string
              description: >-
                A descriptive name of the video that's displayed in the player.
                If not specified, it will default to the input file's name.
              example: My video
            description:
              type: string
              description: A description of the video that's displayed in the player.
              example: A new video for my business.
            duration_in_ms:
              type: integer
              description: Duration of the video in milliseconds.
              format: int64
            unpublish:
              type: boolean
              description: >-
                If `true`, the `unpublished_at` is respected and the video will
                not be available after `unpublished_at`. If `false`, the video
                will not be unpublished.
              default: false
            unpublished_at:
              type: string
              description: >-
                Date and time, in ISO-8601 format when video is no longer
                available for publishing. After this date, the video is not
                visible in the player if using
                [ovp-plugin](https://developer.wowza.com/docs/wowza-flowplayer/plugins/wowza-video-platform-integration/)
                to request the video.
              format: date-time
              example: '2025-01-01T12:33:22Z'
            published:
              type: boolean
              description: >-
                Determines, together with `published_at` and `unpublished_at`,
                if this video will be visible in public listings such as
                MRSS-feeds, endscreens, and playlists. If `true`, and if
                `published_at` and `unpublished_at` allow, the video will be
                visible.
            published_at:
              type: string
              description: >-
                Date and time, in ISO-8601 format, when video is available for
                publishing. Before this date the video is not visible in the
                player if using
                [ovp-plugin](https://developer.wowza.com/docs/wowza-flowplayer/plugins/wowza-video-platform-integration/)
                to request the video.
              format: date-time
              example: '2024-05-01T12:33:22Z'
            tags:
              type: array
              description: A list of tags.
              example:
                - foo
                - bar
              items:
                type: string
                description: A list of tags.
                example:
                  - foo
                  - bar
            remote:
              type: boolean
              description: >-
                If true, it indicated that the source file of the video is
                hosted in an external storage location.
              default: false
              example: false
            category_id:
              type: string
              description: >-
                The unique identifier for the category that the video belongs
                to.
              default: <The account's default category>
            no_ads:
              type: boolean
              description: |-
                When set to `true`, no ads will be displayed during this video. 

                **Note**: This feature only works for Iframe embeds.
            ad_keywords:
              type: string
              description: >-
                Used for replacing the `ad_keywords` macro in the VAST-tag in
                any player that plays the video.
              example: special_ads
            created_at:
              type: string
              description: Date and time, in ISO-8601 format, when video was created.
              format: date-time
              example: '2024-05-15T12:33:22Z'
            updated_at:
              type: string
              description: Date and time, in ISO-8601 format, when video was updated.
              format: date-time
              example: '2024-05-16T12:33:22Z'
            state:
              type: string
              description: >-
                The current state of the video. The state reflects the current
                status of the video files for the video asset. Possible states
                listed below:



                | State | Description |

                |-----------|-------|

                | UPLOADING  | The source file is currently being uploaded or
                waiting to be downloaded by our API. |

                | WAITING_FOR_ENCODER | The source file was successfully
                downloaded by the platform and is in queue to be encoded. |

                | PROCESSING  | Source file for the asset is encoding. The
                current encoding progress can be found on `encoding_progress`
                property. |

                | FINISHED | The encoding is done and the encoded files can be
                fetched. In this state it's possible to embed the video. |

                | ERROR  | If the platform, for some reason, could not download
                the source file or failed during the encoding process.
                `error_messsage` property can give more information about why it
                errored.  |

                | DELETED  | The video files have been deleted. Usually the
                Video asset have been deleted when this state is reached and
                because of that it's very uncommon to see assets with this
                state. |
              example: PROCESSING
            encoding_progress:
              type: number
              description: >-
                Progress of video encoding, in percentage. The max value, `100`,
                is reached when all video files have been encoded.
              format: double
            upload_progress:
              type: number
              description: >-
                Progress of source file upload, in percentage. If the value is
                `100`, the source file is uploaded.
              format: double
            error_message:
              type: string
              description: >-
                If the platform failed to encode the source file, a message
                describing the error reason will be presented in this
                property.  
            deactivated:
              type: boolean
              description: >-
                If `true`, this video has been deactivated and is no longer
                available for embedding. This usually happens if the account was
                cancelled or trial limits were exceeded.
              default: false
            images:
              type: array
              description: >
                Images used together with the video in the platform and the
                player.


                For platform video images specified in create and update
                requests, these are uploaded and delivered through the platform.
                For remote assets, the specified image URLs are passed along to
                the player using the URL specified in the request.
              items:
                $ref: '#/components/schemas/ImageModel'
            encodings:
              type: array
              description: Array containing all available video files and their metadata.
              items:
                $ref: '#/components/schemas/EncodingModel'
            shallow_copy:
              type: boolean
              description: >
                Specifies whether this video is a shallow copy of another video.
                A shallow copy uses video files controlled by another video,
                usually on another workspace.



                Videos that are shallow copies can't use all features available
                for normal videos. For example, it's not possible to upload a
                new version of the video.



                Another difference is that deleting the video will not delete
                any video files. If the video asset that is the source of the
                copy is deleted, the files will no longer be available for this
                asset.
            shallow_copy_source_id:
              type: string
              description: >-
                If the video is a shallow copy, this field contains the ID of
                the source video entity.


                **Note:** There are cases where it is not possible to identify
                the source and in those cases this value will be `null`.
            multiple_audio_tracks:
              type: boolean
              description: >-
                If `true`, this video has several different audio tracks
                available for the player. For example, there may be audio tracks
                in different languages.
            audio_only:
              type: boolean
              description: If `true`, this video has no video track but only audio tracks.
            version:
              type: integer
              description: >-
                Tracks the number of times a new source file was uploaded for
                this video asset. For each time a new source file is uploaded,
                the value increases by one.
              format: int32
