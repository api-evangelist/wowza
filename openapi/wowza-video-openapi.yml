    stream_target_property:
      type: object
      title: property
      description: >-
        A stream target property. The property configuration consists of a
        key/value pair and the section of the stream target configuration table
        the key/value pair is stored in.
      required:
        - key
        - section
        - value
      properties:
        key:
          type: string
          description: >-
            The key of the property.


            The following table lists the available property keys.


            Key | Description

            ----------------|-------------

            **acao** | Explicitly specifies the origin that can access the
            stream. While most streams won't need the origin explicitly set, you
            might use this property for older players that don't send the
            Referer header in their stream request. <br/><br/>**Available on
            these targets types:** Wowza CDN on Fastly

            **chunkSize** | Defines the duration of the time-based audio and
            video chunks that Wowza Video delivers to the target.
            <br/><br/>**Available on these targets types:** Wowza CDN on Fastly,
            Custom: akamai_cupertino

            **convertAMFData** | Determines whether Wowza Video converts
            incoming AMF data into ID3 tags. <br/><br/>**Available on these
            targets types:** Wowza CDN on Fastly, Custom: akamai_cupertino

            **playlistSeconds** | Defines the maximum allowable length of the
            playlist. <br/><br/>**Available on these targets types:** Wowza CDN
            on Fastly, Custom: akamai_cupertino

            **playSSL** | Determines whether Wowza Video sends the stream from
            the target to the player by using SSL (HTTPS).  
            <br/><br/>**Available on these targets types:** Custom:
            akamai_cupertino

            **sendSSL** | Determines whether Wowza Video sends the stream from
            the transcoder to the target by using SSL (HTTPS).  
            <br/><br/>**Available on these targets types:** Custom:
            akamai_cupertino

            **redundantChunklists** | Determines whether Wowza Video creates
            redundant chunklists within a playlist. If a primary chunklist
            within a playlist fails, players that support redundancy during
            playback can switch to the redundant chunklist. <br/><br/> **Note:**
            Enabling **redundantChunklists** increases playback reliability but
            doubles egress data usage and associated charges.
            <br/><br/>**Available on these targets types:** Custom:
            akamai_cupertino

            **relativePlaylists** | Allows the viewer to watch the stream over
            HTTP and HTTPS, whichever protocol their browser calls.
            <br/><br/>**Available on these targets types:** Wowza CDN on Fastly,
            Custom: akamai_cupertino
          example: ''
          enum:
            - acao
            - chunkSize
            - convertAMFData
            - sendSSL
            - playSSL
            - playlistSeconds
            - redundantChunklists
            - relativePlaylists
        section:
          type: string
          description: >-
            The section of the stream target configuration table that contains
            the

            property.



            Section | Valid keys for the section

            ----------------|-------------

            **hls** | **acao**, **chunkSize**, **convertAMFData**, and
            **sendSSL**

            **playlist** | **playSSL**, **playlistSeconds**,
            **redundantChunklists**, and **relativePlaylists**
          example: ''
          enum:
            - hls
            - playlist
        value:
          type: string
          description: >-

            The value of the property.


            The following table provides information about valid values for each
            property key.


            Key(s) | Values for the key

            ----------------|-------------

            **acao** | Displays as **http://&lt;_origin_&gt;**

            **chunkSize** | Valid values are the integers **2**, **4**, **6**,
            **8**, and **10**.

            **convertAMFData** <br/> **playSSL** <br/> **sendSSL** <br/>
            **redundantChunklists** <br/> **relativePlaylists** | Valid values
            are the Booleans **true** and **false**.

            **playlistSeconds** | Valid values are any integer between **6** and
            **28800** (8 hours).
          example: ''
      example:
        key: chunkSize
        section: hls
        value: 6
