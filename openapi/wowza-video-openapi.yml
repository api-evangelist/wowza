  /analytics/qoe/errors/detail/message/{error_code}:
    get:
      summary: Fetch top error messages by error code
      description: >-
        (Available from version 2.0) This operation returns a list of the most
        frequent error messages associated with a specified error code,
        including the number of times each message occurred.
      operationId: analyticsQoeErrorsDetailMessage
      tags:
        - quality_of_experience
      x-codeSamples:
        - lang: Shell
          source: |
            // Using cURL
            curl -H "Authorization: Bearer ${WV_JWT}" \
              
              -H "Content-Type: application/json" \
              -X "GET" \
              "${WV_HOST}/api/2.0/analytics/qoe/errors/detail/message/:error_code/?from=2024-09-08T14:35:00.486Z&to=2024-10-08T14:35:00.486Z&devices=Desktop&include=trend';
        - lang: JavaScript
          source: >
            // Using Node.js

            const https = require('https');

            const crypto = require('crypto');

            var hostname = 'api.video.wowza.com'

            var path =
            '/api/2.0/analytics/qoe/errors/detail/message/7ced08dd-a744-4944-bb87-019979cb3597,6fa964ce-9515-4001-ae72-f17ae52dbf6c?from=2024-09-08T14:35:00.486Z&to=2024-10-08T14:35:00.486Z&devices=Desktop&include=trend';

            //For security, never reveal API token in client-side code

            var wvJWT = 'Bearer [your JWT]';


            const options = {
              hostname: hostname,
              path: path,
              headers: {
                'Authorization': wvJWT,
                'Content-Type': 'application/json'
              }
            };

            https.get(options, function(res) {
              var body = '';
              res.on('data', function(data){
                body += data;
              });
              res.on('end', function() {
                console.log(JSON.parse(body));
              });
            }).on('error', function(e) {
              console.log(e.message);
            });
      parameters:
        - name: error_code
          in: path
          required: true
          description: >-
            The unique identifier that represents a specific playback error. See
            this <a
            href="https://try.flowplayer.com/?channel=stable#0=N4IgtglgJlA2CmIBcBWADAGhAZ3ggxgC7xTIgB0+22IW+A9rPQE5nMDmARgBQDMAHBnRCAbAEpaIQgAt4YREnABDYswhLYAWgAOG+ADsI7aYUmwlAT3oBXU4qW36k5vGwQAXvCWcEyQs2t4LBIIQm9fJH9ArEJ6Rk4lVkiAoJAAMwgEABVvGmTokFgIfQBrHM48qNTsaUT4ACFbWP0--o0E7Xdp8LxrdHwxHU7x8OGq7IuX6LAn++Q-arrtd9F5w4bw6sufRBcwtiJDfh+at2Ch6uH+WhrvzmPxDbwPVlVQAmNLsNn0VOaGVCAALX4bRDQ-EQPTCLUSnwVN6Hqa4uWgcwIAgKt6GkfhhWYBEoGYElrQ5egPy1epJQRJUAG5JGkaAoAMeZsVxSFFFJckQBRakyA5TgSXgIgMzRNRXG4NImARbRzAseBmAzZh3mYbAxHINIWGFJR8GkbhuC+IkLAwAACBgGL+MQ5QAPkM4AFX0QzjMpbBCEM-ThQQOVDPpE55DRSgXBUeA3LkaluCVbBdH0JUxFs+zBichyGKCwyPK86wfMIPyvGIIL0tCnAIqimKHKGZywh8eBks8440upch2HgQgcupeolygPLZMUzQTNcQq7JclUgvIYgq0IZ1KVRZyPP0orusG4bRvG6lKu6oqyoQcglG0bQDDa1yECM2aEGi--oruql7178WkZ4R6TiAce6dM7T1nuJee0lF5FxLj7JQ69N4qAgDvPeB81rHyxmfIYpM-7YGvsUdi98m6KCfmoV+tEP4tG7t-fuigIGSSgawLACdAHAMnmAueDDLDQOXrAhA8DXCIO3rvfeh9yoe3gOcawsBCCk3oQvOSN9CExAfs3Z+5D36dyoV-Z6P8yDyMYbXDiLCx69AnqAmenCFFLxXnAhBW9kEiLQUfNBrdd4GO4YXOuKjiE4Abm3IBlCmJ-ExEAA">list</a>
            for all the available error codes in Wowza Flowplayer.



            Example:

