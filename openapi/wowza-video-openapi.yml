    custom_stream_target_input:
      type: object
      description: ''
      required:
        - stream_target_custom
      properties:
        stream_target_custom:
          type: object
          title: stream_target_custom
          description: ''
          required:
            - name
            - primary_url
            - provider
            - stream_name
          properties:
            name:
              type: string
              description: >-
                A descriptive name for the custom stream target. Maximum 255
                characters.
              example: My Custom Stream Target
            primary_url:
              type: string
              description: >-
                The primary RTMP ingest URL. Hostnames can't contain
                underscores.
              example: rtmp://p.ep337857.i.akamaientrypoint.net/EntryPoint
            provider:
              type: string
              description: The CDN for the target.
              example: rtmp
              enum:
                - akamai_cupertino
                - rtmp
                - rtmps
            stream_name:
              type: string
              description: >-
                The name of the stream as defined in the target's ingestion
                settings. The protocol, host name, and path components of the
                stream name URL must be 255 characters or less. The query
                strings and parameter components of the stream name URL must be
                1024 characters or less.
              example: c8467d50@337857
            backup_url:
              type: string
              description: >-
                The backup RTMP ingest URL of the custom stream target. Not all
                providers or third-party CDNs provide backup URLs. Not for use
                with the akamai_cuptertino custom *provider*.


                **Note:** When both the primary and backup URLs are used, Wowza
                Video sends the stream to both URLs, allowing a provider or 3rd
                party CDN to improve reliability and prevent playback
                disruption. If you want to use both URLs, make sure you add the
                stream target to the output rendition twice, once with
                *use_stream_target_backup_url* as **false** (the default) and
                once with *use_stream_target_backup_url* as **true**. See <a
                href="https://api.docs.video.wowza.com/index/current/tag/transcoders/#tag/transcoders/operation/createTranscoderOutputOutputStreamTarget">POST
                /transcoders/[ID]/outputs/[ID]/output_stream_targets</a> for
                more information.


                **Example:** <code>"backup_url":
                "rtmp://b.ep337857.i.akamaientrypoint.net/EntryPoint"</code>
              example: rtmp://b.ep337857.i.akamaientrypoint.net/EntryPoint
            playback_urls:
              type: object
              title: Hash of playback URLs
              description: >-
                Web addresses that the target uses to play streams. Available
                from version 1.7.


                **Example:** See response body sample
              properties:
                hls:
                  type: string
                  description: >-
                    Web address that the target uses to play HLS streams.
                    <br/><br/> The format is a hash where the key is **hls** and
                    the value is the playback URL. <br/>Example&#58;
                    "hls":&nbsp;"http&#58;//&lt;*domain*&gt;/master.m3u8"
                hds:
                  type: string
                  description: >-
                    Web address that the target uses to play HDS streams. Not
                    for use with the akamai_cupertino custom *provider*.
                    <br/><br/>The format is a hash where the key is **hds** and
                    the value is the playback URL. <br/>Example&#58;
                    "hds":&nbsp;"http&#58;//&lt;*domain*&gt;/manifest.f4m"
                rtmp:
                  type: string
                  description: >-
                    Web address that the target uses to play RTMP streams.
                    <br/><br/>The format is a hash where the key is **rtmp** and
                    the value is the playback URL. <br/>Example&#58;
                    "rtmp":&nbsp;"rtmp&#58;//cp319499.live.edgefcs.net/live/c9467d50@337857"
            password:
              type: string
              description: >-
                A *username* must also be present. The password associated with
                the target username for RTMP authentication. Not for use with
                the akamai_cupertino custom *provider*.

                **Example:** <code>"password": "cb1e77e98d"</code>
              example: cb1e77e98d
            username:
              type: string
              description: >-
                The username or ID that the target uses for RTMP authentication.
                Not for use with the akamai_cupertino custom *provider*.
              example: '319699'
