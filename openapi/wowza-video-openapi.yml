    analytics_viewers_account:
      type: object
      description: ''
      properties:
        account:
          type: object
          title: account
          description: ''
          properties:
            viewers:
              type: integer
              description: >-
                The total number of unique viewers to download at least one
                chunk of the stream. A unique viewer is a single IP address;
                multiple users that share the same IP address are counted once.
              example: ''
              format: int32
            countries:
              type: object
              title: countries
              description: An array of viewer countries.
              properties:
                code:
                  type: string
                  description: A country code where the stream was requested.
                  example: ''
                viewers:
                  type: integer
                  description: >-
                    The total number of unique viewers to download at least one
                    chunk of the stream. A unique viewer is a single IP address;
                    multiple users that share the same IP address are counted
                    once.
                  example: ''
                  format: int32
            renditions:
              type: object
              title: renditions
              description: An array of viewer renditions.
              properties:
                name:
                  type: integer
                  description: >-
                    The rendition of the stream played. A rendition name is the
                    smaller number of the resolution. The resolution is
                    [width]x[height] in which the stream was played. Renditions
                    names have to be unique. If you've created two renditions
                    that have the same height and width, Wowza Video increments
                    the value of the height and uses that as the rendition name.


                    Example: Two renditions of 1280x720 will result in rendition
                    names of 720 and 721.
                  example: ''
                viewers:
                  type: integer
                  description: >-
                    The total number of unique viewers to download at least one
                    chunk of the stream. A unique viewer is a single IP address;
                    multiple users that share the same IP address are counted
                    once.
                  example: ''
                  format: int32
            devices:
              type: object
              title: devices
              description: An array of viewer devices.
              properties:
                name:
                  type: string
                  description: A device where the stream was played.
                  example: ''
                viewers:
                  type: integer
                  description: >-
                    The total number of unique viewers to download at least one
                    chunk of the stream. A unique viewer is a single IP address;
                    multiple users that share the same IP address are counted
                    once.
                  example: ''
                  format: int32
            trend:
              type: object
              title: Array of viewer trends
              description: >-
                An array of viewer trend data. The granularity of sampled data
                changes based on the from and to query values you use:


                <ul><li>0 minutes to 8 hours - Samples returned per minute</li>
                <li>8 hours, 1 second to 24 hours - Samples returned per
                hour</li> <li>24 hours, 1 second to 175 days - Samples returned
                per day</li> <li>175 days to 14 years - Samples returned per
                month</li> <li>14 years or greater - Samples returned per
                year</li></ul>


                <strong>Defaults</strong>: from = last billing date, to = end of
                current day
              properties:
                sampled_at:
                  type: string
                  description: The date and time the trend data was sampled.
                  format: date-time
                viewers:
                  type: integer
                  description: >-
                    The total number of unique viewers to download at least one
                    chunk of the stream. A unique viewer is a single IP address;
                    multiple users that share the same IP address are counted
                    once.
                  example: ''
                  format: int32
            time_zone:
              title: time_zone
              type: string
              description: >-
                The time zone in which the data is returned. The default time
                zone in which the data is returned is **Etc/UTC**.  
              example: ''
            limits:
              type: object
              description: The time frame represented in the response.
              properties:
                from:
                  type: string
                  description: The start of the range of time represented in the response.
                  example: ''
                  format: date-time
                to:
                  type: string
                  description: The end of the range of time represented in the response.
                  example: ''
                  format: date-time
      example:
        account:
          viewers: 7
          countries:
            - code: US
              viewers: 4
            - code: DE
              viewers: 3
          renditions:
            - name: 720
              viewers: 7
          devices:
            - name: Desktop
              viewers: 7
          time_zone: America/New_York
          trend:
            - sampled_at: '2024-03-14T00:00:00Z'
              viewers: 7
            - sampled_at: '2024-03-15T00:00:00Z'
              viewers: 7
            - sampled_at: '2024-03-16T00:00:00Z'
              viewers: 7
            - sampled_at: '2024-03-17T00:00:00Z'
