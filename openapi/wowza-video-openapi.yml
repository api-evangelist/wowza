    hosted_page_response_object:
      type: object
      description: Configuration of the hosted page.
      properties:
        enabled:
          type: boolean
          description: >-
            A web page hosted by Wowza Video that includes a player for the live
            stream. The default, **true**, creates a hosted page. Specify
            **false** to not create a hosted web page.
          example: ''
        description:
          type: string
          description: >-
            A description that appears on the hosted page below the player.
            Can't include custom HTML, JavaScript, or other tags.
          example: ''
        logo_image_url:
          type: string
          description: >-
            The path to a GIF, JPEG, or PNG logo file that appears in the
            upper-left corner of the hosted page. Logo file must be 2.5 MB or
            smaller.
        sharing_icons:
          type: boolean
          description: >-
            Icons that let viewers share the stream on Facebook, Google+,
            Twitter, and by email. The default, **true**, includes sharing icons
            on the hosted page. Specify **false** to omit sharing icons.
          example: ''
        title:
          type: string
          description: >-
            A title for the page that appears above the player. Can't include
            custom HTML, JavaScript, or other tags.
          example: ''
        url:
          type: string
          description: >-
            The URL of the Wowza Video-hosted webpage that viewers can visit to
            watch the stream.
          example: ''
    player_response_object:
      type: object
      description: >-
        The **player** object is deprecated in 2.0. Create and update player
        configurations in the user interface. 


        Any values you send using the **player** object will be ignored.


        The following fields have been moved outside of the **player** object
        and reside within the **live_stream** object where you can still access
        them through the API:
          * **embed_code**
          * **hls_playback_url**
          * **logo_image_url**
          * **logo_position**
          * **video_poster_image_url**
          * **width**
      properties:
        customizations:
          type: object
          description: Configuration of the player customizations.
          properties:
            play_icon:
              type: string
              description: >-
                A play icon that appears on the video preview. The default,
                **solid**, uses the standard play (solid triangle) icon.
                **outlined** uses an alternate (outlined triangle) play icon.
                **ring** uses an alternate (small solid triangle enclosed in a
                circle) play icon.
              example: ''
              enum:
                - solid
                - outlined
                - ring
            thin_timeline:
              type: boolean
              description: >-
                A control bar that appears on the video. Specify **true** to
                display the control bar on the video. The default is **false**.
              example: ''
            drag_handle:
              type: boolean
              description: >-
                A drag handle that you can use to drag the progress of the video
                on the timeline. Specify **true** to display the drag handle.
                The default is **false**.
              example: ''
            volume:
              type: boolean
              description: >-
                A volume button that appears on the video. Specify **true** to
                display the volume button. The default is **true**.
              example: ''
            mute:
              type: boolean
              description: >-
                A mute button that appears on the video. Specify **true** to
                display the mute button. The default is **true**.
              example: ''
            fullscreen:
              type: boolean
              description: >-
                A fullscreen button that appears on the video. Specify **true**
                to display the fullscreen button. The default is **true**.
              example: ''
            show_player_title:
              type: boolean
              description: >-
                The player title that appears on the video. Specify **true** to
                display the player title. The default is **false**.
              example: ''
            color:
              type: string
              description: >-
                The color of the timeline and volume bar of the player. You can
                set the color of your choice by passing a hex code for that
                specific color. 
              example: ''
        countdown:
          type: boolean
          description: >-
            A clock that appears in the player before the event and counts down
            to the start of the stream. Specify **true** to display the
            countdown clock. The default is **false**.
          example: ''
        countdown_at:
          type: string
          description: >-
            The date and time that the event starts, used by the countdown
            clock. Specify **YYYY-MM-DD HH:MM:SS**, where **HH** is a 24-hour
            clock in UTC.
          example: ''
        embed_code:
          type: string
          description: >-
            The HTML code that can be used in an external webpage to host the
            Wowza Flowplayer.
          example: ''
        hls_playback_url:
          type: string
          description: >-
            The address that can be used to configure playback of the stream
            using the HLS protocol.
          example: ''
        id:
          type: string
          description: The unique alphanumeric string that identifies the player.
          example: ''
        logo_image_url:
          type: string
          description: >-
            The path to a GIF, JPEG, or PNG logo file that appears partially
            transparent in a corner of the player throughout playback. Logo file
            must be 2.5 MB or smaller.
          example: ''
        logo_position:
          type: string
          description: >-
            The corner of the player in which you want the player logo to
            appear. The default is **top-left**.
          example: ''
          enum:
            - top-left
            - top-right
            - bottom-left
            - bottom-right
        plugins:
          type: object
          description: Configuration of the plugins.
          properties:
            airplay:
              type: boolean
              description: >-
                If **true**, enables Airplay functionality in the player which
                allows you to cast to an Airplay device. The default is
                **false**.
              example: ''
            chromecast:
              type: boolean
              description: >-
                If **true**, enables Chromecast functionality in the player
                which allows you to cast to a Chromecast device. The default is
                **false**.
              example: ''
        responsive:
          type: boolean
          description: >-
            A player whose size adjusts according to the device on which it's
            being viewed. If **true**, creates a responsive player. If
            **false**, specify a *player_width*.
          example: ''
        type:
          type: string
          description: >-
            The player you want to use.


            **Wowza Video subscribers**</br> Wowza Flowplayer (wowza_flowplayer)
            is the only valid option. You're a subscriber if you have access to
            Asset Management and Historic and Live Analytics in the user
            interface.


            The Wowza Flowplayer is an easy-to-use, commercial grade player
            designed for builders and developers. It provides HTML5, HLS, and
            MPEG-DASH playback and plays streams on any browser and device. It
            can be
            [customized](https://www.wowza.com/docs/embed-and-customize-wowza-flowplayer-in-your-site)
            if you embed it in your site.


            **Other subscribers**</br> original _html5 and wowza_player are the
            only valid options and original_html5 is the default.
            **original_html5** provides HTML5 playback and falls back to Flash
            on older browsers. **wowza_player** requires that
            *target_delivery_protocol* be **hls-https** and
            *closed_caption_type* be **none**.
          example: ''
        video_poster_image_url:
          type: string
          description: >-
            The path to a GIF, JPEG, or PNG poster image that appears in the
            player before the stream begins. Poster image files must be 2.5 MB
            or smaller.
          example: ''
        width:
          type: integer
          description: >-
            The width, in pixels, of a fixed-size player. The default is
            **640**.
          example: ''
          format: int32
    live_stream:
      type: object
      description: ''
      properties:
        aspect_ratio_height:
          type: integer
          description: >-
            The height, in pixels, of the video source. Should correspond to a
            widescreen (16:9) or standard (4:3) aspect ratio and be divisible by
            8. Combined with **aspect_ratio_width**, makes up the input
            resolution.


            Default: **720**.
          example: ''
          format: int32
        aspect_ratio_width:
          type: integer
          description: >-
            The width, in pixels, of the video source. Should correspond to a
            widescreen (16:9) or standard (4:3) aspect ratio and be divisible by
            8. Combined with **aspect_ratio_height**, makes up the input
            resolution.


            Default: **1280**.
          example: ''
          format: int32
        asset_id:
          type: string
          description: >-
            Only applies to live streams created from re-streaming an asset in
            Asset Management. The id for the asset associated with the
            re-streamed live stream. You can manage this asset in Asset
            Management.
        billing_mode:
          type: string
          description: >-

            The billing mode for the stream. 



            Default: **pay_as_you_go**.


                    
            **pay_as_you_go** — Billed as a single event. A single event is
            use-based and you incur charges for the time spent streaming.
                
            **twentyfour_seven** — Billed as a 24x7 channel. A 24x7 channel is
            unlimited stream time for one channel. This billing mode doesn't
            incur overages, since it's unlimited.
          example: ''
          enum:
            - pay_as_you_go
            - twentyfour_seven
        broadcast_location:
          $ref: '#/components/schemas/broadcast_location'
        closed_caption_type:
          type: string
          description: >-
            The type of closed caption data being passed from the source. The
            default, **none**, indicates that no data is being provided. **cea**
            indicates that a CEA closed captioning data stream is being
            provided. **on_text** indicates that an onTextData closed captioning
            data stream is being provided. **both** indicates that both CEA and
            onTextData closed captioning data streams are being provided.
          example: ''
          enum:
            - none
            - cea
            - on_text
            - both
        connection_code:
          type: string
          description: >-
            A six-character, alphanumeric string that allows certain encoders,
            including Wowza Streaming Engine and the Wowza GoCoder app, to
            connect with Wowza Video. The code can be used once and expires 24
            hours after it's created.
          example: ''
        connection_code_expires_at:
          type: string
          description: The date and time that the *connection_code* expires.
          example: ''
          format: date-time
        created_at:
          type: string
          description: The date and time that the live stream was created.
          example: ''
          format: date-time
        delivery_method:
          type: string
          description: >-
            The type of connection between the video source and the transcoder.
            The default, **push**, instructs the source to push the stream to
            the transcoder. **pull** instructs the transcoder to pull the video
            from the source. **cdn** uses a stream source to deliver the stream
            to the transcoder.
          example: ''
          enum:
            - pull
            - cdn
            - push
        delivery_protocols:
          type: array
          description: >-
            An array of direct delivery protocols enabled for this live stream.
            By default, **rtmp**, **rtsp**, **webrtc**, and **wowz** are
            enabled.
          items:
            type: string
        description:
          type: string
          description: An optional description of the live stream.
          example: ''
        direct_playback_urls:
          type: object
          description: >-
            A list of direct playback URLs for the live stream's delivery
            protocols. Each protocol has a URL for the source and a URL for each
            output rendition.
          properties:
            delivery_protocol:
              type: array
              description: The name of the direct playback protocol.
              items:
                type: object
                title: direct_playback_url
                properties:
                  name:
                    type: string
                    description: |-
                      The name of the playback URL: **source**, **default**,
                       or the output rendition's resolution.
                    example: ''
                  output_id:
                    type: string
                    description: >-
                      Only for output rendition-based playback URLs, not source
                      playback URLs. The unique alphanumeric string that
                      identifies the output rendition.
                    example: dcxq5q6c
                  url:
                    type: string
                    description: The playback URL for the source or output rendition.
                    example: >-
                      https://abcdef.dev.entrypoint.video.wowza.com/app-B8P6K226/ngrp:43a23e5a_all/playlist.m3u8
                  application_name:
                    type: string
                    description: (WebRTC only) The application name for the WebRTC output.
                    example: ''
                  stream_name:
                    type: string
                    description: >-
                      (WebRTC only) The stream name for the WebRTC output
                      rendition.
                    example: ''
        encoder:
          type: string
          description: >-
            The video source for the live stream. Choose the type of camera or
            encoder you're using to connect to the Wowza Video transcoder. If
            your specific device isn't listed, choose **ipcamera**,
            **other_rtmp**, or **other_rtsp**.
          example: ''
          enum:
            - wowza_clearcaster
            - wowza_gocoder
            - wowza_streaming_engine
            - media_ds
            - axis
            - epiphan
            - file
            - hauppauge
            - jvc
            - live_u
            - matrox
            - newtek_tricaster
            - osprey
            - sony
            - telestream_wirecast
            - teradek_cube
            - vmix
            - x_split
            - ipcamera
            - other_rtmp
            - other_rtsp
            - other_webrtc
            - other_udp
            - other_srt
        flowplayer:
          type: boolean
          description: >-
            Indicates whether or not the player for the live stream is a Wowza
            Flowplayer player. **True** indicates the player is a Wowza
            Flowplayer player. Our new Wowza Video experience uses Wowza
            Flowplayer. If you are a Wowza Video legacy subscriber, Wowza
            Flowplayer is also the player used.


            **False** indicates the player is either an **original_html5**
            player or **wowza_player**. The original HTML and Wowza players are
            the players available for Wowza Streaming Cloud subscribers.
          example: ''
        hosted_page:
          $ref: '#/components/schemas/hosted_page_response_object'
        id:
          type: string
          description: The unique alphanumeric string that identifies the live stream.
          example: ''
        low_latency:
          type: boolean
          description: >-
            For streams whose *target_delivery_protocol* is **hls-https**. If
            **true**, turns off incoming and sort packet buffers and delivers
            smaller video packets to the player, which can reduce latency as
            long as networks can handle the increased overhead. The default is
            **false**.
          example: ''
        name:
          type: string
          description: A descriptive name for the live stream. Maximum 200 characters.
          example: ''
        playback_stream_name:
          type: string
          description: The stream name used in the direct playback URL.
          example: ''
        player:
          $ref: '#/components/schemas/player_response_object'
        player_id:
          type: string
          description: >-
            (Available from version 2.0) The unique alphanumeric string that
            identifies the player configuration to use for this stream. 
                
                
            When you pass a player configuration ID, Wowza Video uses that
            player configuration to customize and style the player. If you don't
            pass a value, the default player configuration for the account is
            used.


            Create and edit player configurations in the user interface. The ID
            is on the **General** tab for the player configuration.


            **Default**: Default player configuration

            <blockquote><strong>Note</strong>: <strong>player_id</strong> is not
            returned in the response if it's not explicitly sent and the default
            player configuration is used instead.</blockquote>


            **Example**: 2205b4e8-b160-43c2-868d-d88698a4e850
        player_type:
          type: string
          description: >-
            (Available from version 2.0) The type of player associated with the
            stream. Streams created in legacy Wowza Video have a  player type of
            *wowza_flowplayer_v1*. Streams created in later versions of Wowza
            Video have a player type of *wowza_flowplayer_v2*.


            Knowing the player type is useful if you've migrated streams from
            legacy Wowza Video. The player for a stream created in the legacy
            version of Wowza Video isn't editable in the new platform. 


            **Example**: wowza_flowplayer_v1
          enum:
            - wowza_flowplayer_v1
            - wowza_flowplayer_v2
        embed_code:
          type: string
          description: >-
            The HTML code that can be used in an external webpage to host the
            Wowza Flowplayer.
          example: ''
        hls_playback_url:
          type: string
          description: >-
            The address that can be used to configure playback of the stream
            using the HLS protocol.
          example: ''
        countdown_at:
          type: string
          description: >-
            The month, day, year, and time of day that the countdown timer
            should stop displaying to the viewer. Specify **YYYY-MM-DD 
            HH:MM:SS**. The response is in UTC time.


            For example, if you set the **countdown_at** for
            **2024-12-15T17:00:00:000Z** and the **countdown_timezone** as 
            **America/New_York**, the viewer would see their current time minus
            the time remaining until the date and time you set. So, if there's 5
            hours  to go until 1700 NYC time for the viewer, the viewer sees
            **5:00:00** on the player indicating their's 5 hours left and the
            timer counts down from there. The countdown starts as soon as the
            streamer configures it.


            Required when **countdown** is **true**.


            **Example:** <code>"countdown_at": "2024-02-01T00:00:00.000Z"
          example: '2024-02-01T00:00:00.000Z'
          format: date-time
